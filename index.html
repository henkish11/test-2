.song{

}

.btns{
display:flex;
gap:4px;
}

button{
border:none;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
}

.play{background:#00ccff;}
.stop{background:#ff2b2b;}

left:0;

align-items:center;
padding:10px;
background:rgba(0,255,204,0.05);

.media input{
