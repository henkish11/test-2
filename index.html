    <meta charset="UTF-8">

    <title>RAMY </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Montserrat:wght@300;400;600;800&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff003c;
            --dark-red: #8a0020;
            --text-light: #ffffff;
            --text-dim: #cccccc;
            --glass-bg: rgba(15, 10, 10, 0.4);
            --glass-border: rgba(255, 0, 60, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-user-drag: none;
            -webkit-touch-callout: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #000;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.9);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--dark-red);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-red);
        }
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: transparent;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translateZ(0);
            will-change: transform;
            pointer-events: none;
        }
        .wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 120px;
        }
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin: 10px auto;
            padding: 15px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            box-shadow: var(--glass-shadow), inset 0 0 20px rgba(255, 0, 60, 0.1);
            flex-wrap: wrap;
            gap: 10px;
        }
        .nav-links {
            display: flex;
            list-style: none;
            width: 100%;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .nav-links li {
            flex: 1 1 auto;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            min-width: 80px;
            padding: 5px 10px;
        }
        .nav-links li:hover {
            color: var(--text-light);
            text-shadow: 0 0 10px var(--primary-red);
            transform: translateY(-2px);
        }
        .nav-links li.active {
            color: var(--primary-red);
            text-shadow: 0 0 15px rgba(255, 0, 60, 0.8);
        }
        .main-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            gap: 30px;
        }
        .page-section {
            display: none !important;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            flex: 1;
        }
        .page-section.active {
            display: flex !important;
        }
        .left-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 100%;
            flex: 1;
        }
        .hero-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.5rem, 8vw, 6rem);
            color: var(--text-light);
            line-height: 1.1;
            margin-bottom: 20px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.5), 0 0 20px rgba(255, 0, 60, 0.4), 0 0 40px rgba(138, 0, 32, 0.8), 3px 3px 5px rgba(0,0,0,0.8);
            letter-spacing: 2px;
            word-wrap: break-word;
            word-break: break-word;
            width: 100%;
        }
        .hero-a-container {
            position: relative;
            display: inline-block;
        }
        .hero-crown {
            position: absolute;
            top: -45px;
            left: -5px;
            width: clamp(50px, 10vw, 80px);
            pointer-events: none;
            z-index: 2;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.6));
            transform: rotate(5deg);
        }
        .btn-profile {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid var(--primary-red);
            color: var(--text-light);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: clamp(0.6rem, 3vw, 0.75rem);
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.1);
            max-width: 100%;
            justify-content: center;
        }
        .btn-profile i {
            transition: transform 0.3s;
        }
        .btn-profile:hover {
            background: rgba(255, 0, 60, 0.2);
            box-shadow: 0 0 25px rgba(255, 0, 60, 0.4), inset 0 0 10px rgba(255, 0, 60, 0.3);
            text-shadow: 0 0 5px white;
        }
        .btn-profile:hover i {
            transform: translateX(5px);
        }
        .right-section {
            max-width: 100%;
            display: flex;
            justify-content: center;
        }
        .glass-card {
            background: linear-gradient(135deg, rgba(30, 10, 10, 0.5), rgba(10, 0, 0, 0.8));
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 60, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: clamp(15px, 4vw, 30px);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 0, 60, 0.15);
            max-width: 100%;
            box-sizing: border-box;
        }
        .image-container {
            width: clamp(150px, 50vw, 220px);
            height: clamp(230px, 75vw, 340px);
            max-width: 100%;
            border-radius: 110px;
            overflow: hidden;
            border: 3px solid rgba(255, 0, 60, 0.4);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.3), inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }
        .image-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 70%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            pointer-events: none;
        }
        .glass-card:hover .image-container img {
            transform: scale(1.05);
        }
        .card-name {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            color: var(--primary-red);
            margin-top: -20px;
            z-index: 2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 15px rgba(255, 0, 60, 0.6);
            font-weight: 600;
            text-align: center;
        }
        .social-profile-card {
            background: linear-gradient(135deg, rgba(20, 5, 5, 0.7), rgba(0, 0, 0, 0.8));
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 60, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: clamp(20px, 5vw, 40px);
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 0, 60, 0.15);
            display: flex;
            align-items: center;
            gap: 30px;
            box-sizing: border-box;
            flex-wrap: wrap;
            justify-content: center;
        }
        .profile-avatar {
            width: clamp(120px, 30vw, 160px);
            height: clamp(120px, 30vw, 160px);
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-red);
            box-shadow: 0 0 20px rgba(255,0,60,0.5), inset 0 0 15px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
            flex: 1;
            min-width: 200px;
        }
        .profile-header-name {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.8rem, 7vw, 3rem);
            color: var(--primary-red);
            text-shadow: 0 0 15px rgba(255, 0, 60, 0.6);
            margin: 0;
            font-weight: 600;
            line-height: 1;
            word-wrap: break-word;
        }
        .profile-phrase {
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: var(--text-light);
            font-style: italic;
            letter-spacing: 1px;
            opacity: 0.9;
        }
        .profile-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .profile-id-badge {
            background: rgba(255, 0, 60, 0.15);
            border: 1px solid var(--primary-red);
            color: var(--text-light);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            font-weight: 800;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            box-shadow: 0 0 10px rgba(255,0,60,0.2);
        }
        .profile-id-badge img.zodiac-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
            pointer-events: none;
        }
        .friend-card {
            width: clamp(220px, 80vw, 280px);
            max-width: 100%;
            padding: clamp(20px, 5vw, 40px) 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .friend-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(255, 0, 60, 0.4);
        }
        .friend-avatar {
            width: clamp(100px, 35vw, 140px);
            height: clamp(100px, 35vw, 140px);
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-red);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.6), inset 0 0 15px rgba(0,0,0,0.8);
            margin-bottom: 10px;
            pointer-events: none;
        }
        .friend-name {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: var(--primary-red);
            text-shadow: 0 0 15px rgba(255, 0, 60, 0.5);
            margin: 0;
            font-weight: 600;
            text-align: center;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 0, 60, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 0, 60, 0.15);
            background: #000;
        }
        .demons-video {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9/16;
            object-fit: cover;
            border-radius: 15px;
            border: 3px solid var(--primary-red);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.4);
            pointer-events: none;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }
        .bw-video {
            width: 100%;
            height: auto;
            aspect-ratio: 9/16;
            border-radius: 15px;
            object-fit: cover;
            filter: grayscale(100%);
            border: 2px solid rgba(255, 0, 60, 0.6);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
            pointer-events: none;
        }
        .custom-video-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 10;
            flex-wrap: wrap;
        }
        .btn-video-overlay {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid var(--primary-red);
            color: var(--text-light);
            width: clamp(35px, 8vw, 40px);
            height: clamp(35px, 8vw, 40px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.2);
        }
        .btn-video-overlay:hover {
            background: rgba(255, 0, 60, 0.4);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.6);
            transform: scale(1.1);
        }
        .mini-player-btn {
            position: fixed;
            bottom: clamp(15px, 4vw, 30px);
            right: clamp(15px, 4vw, 30px);
            width: clamp(45px, 12vw, 55px);
            height: clamp(45px, 12vw, 55px);
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 60, 0.5);
            transition: transform 0.3s;
            z-index: 100;
        }
        .mini-player-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(255, 0, 60, 0.8);
        }
        .spinning-icon {
            animation: spinMusic 3s linear infinite;
            animation-play-state: paused;
        }
        @keyframes spinMusic {
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 850px) {
            .main-content {
                flex-direction: column;
                justify-content: center;
                gap: 40px;
                text-align: center;
                margin-top: 20px;
            }
            .left-section {
                align-items: center;
            }
            nav {
                border-radius: 20px;
                padding: 10px;
            }
        }
        @media (max-width: 480px) {
            .social-profile-card {
                text-align: center;
                flex-direction: column;
                gap: 20px;
            }
            .profile-info {
                align-items: center;
            }
            .profile-badges {
                justify-content: center;
            }
            .gallery-grid { 
                grid-template-columns: 1fr;
            }
            .wrapper { padding-bottom: 100px; }
            .nav-links li {
                font-size: 0.7rem;
                padding: 5px;
                min-width: 60px;
            }
            .glass-card {
                padding: 15px;
            }
        }
    </style>

            document.querySelectorAll('.section-video').forEach(vid => {

            });

        document.body.addEventListener('click', forcePlayVideos, { once: true });
        document.body.addEventListener('touchstart', forcePlayVideos, { once: true });
        const bgAudio = document.getElementById('bg-audio');
        const miniPlayerBtn = document.getElementById('btn-toggle-music');
        const spinningIcon = document.querySelector('.spinning-icon');
        let isMusicIntended = false; 
        if (miniPlayerBtn) {
            miniPlayerBtn.addEventListener('click', () => {
                if (isMusicIntended) {
                    if (bgAudio) bgAudio.pause();
                    isMusicIntended = false;
                    if (spinningIcon) spinningIcon.style.animationPlayState = 'paused';
                } else {
                    if (bgAudio) bgAudio.play().catch(e => {});

                    if (spinningIcon) spinningIcon.style.animationPlayState = 'running';

        function onYouTubeIframeAPIReady() {

                playerVars: {
                    'controls': 1,      
                    'rel': 0,           
                    'showinfo': 0,
                    'modestbranding': 1
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }
        function onPlayerStateChange(event) {
            const playPauseIcon = document.querySelector('#btn-playpause i');
            if (event.data === YT.PlayerState.PLAYING) {
                if (playPauseIcon) playPauseIcon.className = 'fas fa-pause';
                if (bgAudio) bgAudio.pause(); 
                if (spinningIcon) spinningIcon.style.animationPlayState = 'paused';
            } 
            else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                if (playPauseIcon) playPauseIcon.className = 'fas fa-play';
                if (isMusicIntended) {
                    if (bgAudio) bgAudio.play().catch(e => {});
                    if (spinningIcon) spinningIcon.style.animationPlayState = 'running';
                }
            }
        }
        const btnMute = document.getElementById('btn-mute');
        if (btnMute) {
            btnMute.addEventListener('click', () => {
                if (ytPlayer && typeof ytPlayer.isMuted === 'function') {
                    const icon = document.querySelector('#btn-mute i');
                    if (ytPlayer.isMuted()) {
                        ytPlayer.unMute();
                        if (icon) icon.className = 'fas fa-volume-up';
                    } else {
                        ytPlayer.mute();
                        if (icon) icon.className = 'fas fa-volume-mute';
                    }
                }
            });
        }
        const btnPlayPause = document.getElementById('btn-playpause');
        if (btnPlayPause) {
            btnPlayPause.addEventListener('click', () => {
                if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
                    if (ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
                        ytPlayer.pauseVideo();
                    } else {
                        ytPlayer.playVideo();
                    }
                }
            });
        }
        const navItems = document.querySelectorAll('.nav-item');
        const sections = document.querySelectorAll('.page-section');
        function switchSection(target) {
            navItems.forEach(n => n.classList.remove('active'));
            navItems.forEach(n => {
                if(n.getAttribute('data-target') === target) {
                    n.classList.add('active');
                }
            });
            sections.forEach(s => s.classList.remove('active'));
            const targetEl = document.getElementById(target);
            if(targetEl) targetEl.classList.add('active');
            document.querySelectorAll('.section-video').forEach(vid => {
                vid.pause();
                vid.currentTime = 0;
            });
            if(targetEl) {
                targetEl.querySelectorAll('.section-video').forEach(vid => {
                    vid.muted = true; 
                    vid.play().catch(e => {});
                });
            }
            if(target === 'video') {
                if(ytPlayer && typeof ytPlayer.playVideo === 'function') {
                    ytPlayer.playVideo();
                }
            } else {
                if(ytPlayer && typeof ytPlayer.pauseVideo === 'function') {

                    if(spinningIcon) spinningIcon.style.animationPlayState = 'running';
                }
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        if (navItems) {
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    const target = item.getAttribute('data-target');
                    switchSection(target);
                });
            });
        }

        if (btnEntrar) {

                switchSection('iEgypt');

                if (bgAudio) bgAudio.play().catch(e => {});
                if (spinningIcon) spinningIcon.style.animationPlayState = 'running';
