<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* TOP */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.box{
  width:100%;
  aspect-ratio:4/3;
  border-radius:14px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
}

/* BIG */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:900px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 25px rgba(0,255,204,0.2);
  padding:20px;
  display:flex;
  gap:20px;
}

/* LEFT */
.left-side{
  width:28%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:15px;
}

/* PROFILE */
.profile{
  display:flex;
  align-items:center;
  gap:18px;
}

.profile img{
  width:95px;
  height:95px;
  border-radius:50%;
  border:3px solid #00ffcc;
  box-shadow:0 0 25px #00ffcc;
}

.name{
  font-size:38px;
  font-weight:bold;
  text-shadow:0 0 25px #00ffcc;
}

/* CHAT */
.chat-links a{
  display:block;
  text-decoration:none;
  color:#00ffcc;
  padding:8px;
  margin-top:6px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:6px;
  text-align:center;
}

/* RIGHT */
.right-side{
  flex:1;
  padding-left:15px;
}

/* SONG BOX */
.songs-inner{
  width:100%;
  border-radius:14px;
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(0,255,204,0.15);
  padding:12px;
}

/* TITLE */
.songs-title{
  text-align:center;
  color:#66ccff;
  margin-bottom:10px;
}

/* GRID */
.songs-grid{
  display:flex;
  gap:10px;
}

.songs-col{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* ROW */
.song-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
  border-radius:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,0,0.12);
  transition:0.3s;
}

.song-row:hover{
  transform:scale(1.02);
}

/* NAME */
.song-name{
  color:#ffff66;
  font-size:12.5px;
  text-shadow:0 0 10px #ffff66;
  animation:pulse 1.8s infinite;
}

/* BUTTONS */
.song-actions{
  display:flex;
  gap:6px;
}

.play{
  background:#00ccff;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 10px #00ccff;
  animation:glow 1.5s infinite;
}

.stop{
  background:#ff2b2b;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 10px #ff2b2b;
  animation:glow 1.5s infinite;
}

/* ANIMATIONS */
@keyframes glow{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.6);}
  100%{filter:brightness(1);}
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

</style>
</head>
