<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
  display:flex;
  justify-content:center;
}

/* SCALE */
.data-section{
  transform:scale(0.9);
  transform-origin:top center;
  width:100%;
  display:flex;
  justify-content:center;
}

/* NEON */
.neon{
  text-shadow:0 0 6px #00ffcc,0 0 12px #00ffcc,0 0 20px #00ffcc;
}

/* TOP BOXES */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:14px;
}

.box{
  height:110px;
  border-radius:10px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
}

/* MAIN */
.big-box{
  width:95%;
  min-height:950px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 25px rgba(0,255,204,0.2);
  padding:20px;
}

/* LEFT */
.left-side{
  width:28%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:15px;
}

.profile{
  display:flex;
  align-items:center;
  gap:15px;
}

.profile img{
  width:95px;
  height:95px;
  border-radius:50%;
  border:3px solid #00ffcc;
  box-shadow:0 0 20px #00ffcc;
}

.name{
  font-size:40px;
}

/* RADIO */
.radio-box{
  margin-top:10px;
  padding:10px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
}

.radio-btn{
  width:100%;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#00ccff;
  box-shadow:0 0 10px #00ccff;
}

/* CHAT */
.chat-links a{
  display:block;
  text-decoration:none;
  color:#00ffcc;
  padding:7px;
  margin-top:5px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:6px;
  text-align:center;
}

/* SONG GRID (PRO CARDS) */
.song-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.song-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,0,0.15);
  box-shadow:0 0 10px rgba(255,255,0,0.08);
  transition:0.3s;
}

.song-card:hover{
  transform:scale(1.04);
  box-shadow:0 0 18px rgba(0,255,204,0.3);
}

.song-name{
  color:#ffff66;
  text-shadow:0 0 10px #ffff66;
  font-size:14px;
}

/* BUTTONS */
.song-actions button{
  border:none;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
}

.play{
  background:#00ccff;
  box-shadow:0 0 10px #00ccff;
}

.stop{
  background:#ff2b2b;
  box-shadow:0 0 10px #ff2b2b;
}
</style>
</head>

<body>

<div class="data-section">

</html>
