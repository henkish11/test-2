<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* ================= TOP IMAGES ================= */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.box{
  width:100%;
  aspect-ratio:4/3;
  border-radius:14px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.04);
}

/* ================= BIG BOX ================= */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:750px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 20px rgba(0,255,204,0.2);
  padding:20px;
  display:flex;
  gap:20px;
}

/* ================= LEFT SIDE ================= */
.left-side{
  width:28%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:15px;
}

/* PROFILE */
.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.profile img{
  width:70px;
  height:70px;
  border-radius:50%;
  border:2px solid #00ffcc;
  box-shadow:0 0 10px #00ffcc;
}

.name{
  font-size:26px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 15px #00ffcc;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.5;}
  100%{opacity:1;}
}

/* RADIOS */
.radio-box{
  margin-top:15px;
  padding:10px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
  background:rgba(0,255,204,0.05);
}

.radio-box h4{
  margin:0 0 5px 0;
  font-size:13px;
}

.radio-box button{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  background:#00ffcc;
  color:#000;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

/* CHAT LINKS */
.chat-links{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.chat-links a{
  text-decoration:none;
  color:#00ffcc;
  padding:8px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:6px;
  font-size:13px;
  text-align:center;
  background:rgba(0,255,204,0.05);
  transition:0.3s;
}

.chat-links a:hover{
  background:#00ffcc;
  color:#000;
}

/* ================= RIGHT SIDE ================= */
.right-side{
  flex:1;
  padding-left:10px;
}

/* ================= SONGS ================= */
.songs-panel{
  margin-top:20px;
  padding:15px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:12px;
  background:rgba(0,255,204,0.05);
}

.songs-title{
  text-align:center;
  font-size:32px;
  color:purple;
  font-weight:bold;
  text-shadow:0 0 15px purple;
  margin-bottom:10px;
}

.songs-grid{
  display:flex;
  gap:10px;
}

.songs-col{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.song{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:6px;
  font-size:12px;
}

.song button{
  border:none;
  padding:4px 8px;
  cursor:pointer;
  font-weight:bold;
  border-radius:4px;
}

.song button:first-of-type{
  background:#00ccff;
  color:#000;
}

.song button:last-of-type{
  background:red;
  color:#fff;
}

</style>
</head>

"d.top4top.io/m_37697zirj5.mp3",
"e.top4top.io/m_3769rnmrk6.mp3",
"d.top4top.io/m_3769a1jgw1.mp3"
];

let audio = new Audio();
let current = -1;

function playSong(i){
  if(current !== -1) audio.pause();
  audio.src = "https://" + songs[i];
  audio.play();
  current = i;
}

function stopSong(i){
  if(current === i){
    audio.pause();
    audio.currentTime = 0;
    current = -1;
  }
}

/* RADIOS */
function playRadio(id){

  let q = document.getElementById("quran");
  let m = document.getElementById("music");

  if(id === "quran"){
    m.pause(); m.currentTime = 0;
    q.paused ? q.play() : q.pause();
  }

  if(id === "music"){
    q.pause(); q.currentTime = 0;
    m.paused ? m.play() : m.pause();
  }

}

</script>
