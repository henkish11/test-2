<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* TOP */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.box{
  width:100%;
  aspect-ratio:4/3;
  border-radius:14px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
}

/* BIG */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:900px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 25px rgba(0,255,204,0.2);
  padding:20px;
  display:flex;
  gap:20px;
}

/* LEFT */
.left-side{
  width:28%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:15px;
}

.profile{
  display:flex;
  align-items:center;
  gap:15px;
}

.profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid #00ffcc;
  box-shadow:0 0 20px #00ffcc;
}

.name{
  font-size:36px;
  font-weight:bold;
  text-shadow:0 0 20px #00ffcc;
}

/* RADIOS */
.radio-box{
  margin-top:15px;
  padding:10px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
}

.radio-btn{
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.quran{ background:#00ffcc; }
.music{ background:#66ccff; }

/* CHAT */
.chat-links a{
  display:block;
  text-decoration:none;
  color:#00ffcc;
  padding:8px;
  margin-top:6px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:6px;
  text-align:center;
}

/* RIGHT */
.right-side{
  flex:1;
  padding-left:15px;
}

/* SONGS */
.songs-inner{
  width:100%;
  border-radius:14px;
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(0,255,204,0.15);
  padding:12px;
}

.songs-title{
  text-align:center;
  color:#66ccff;
  margin-bottom:10px;
}

.songs-grid{
  display:flex;
  gap:10px;
}

.songs-col{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* SONG ROW */
.song-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
  border-radius:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,0,0.12);
}

.song-name{
  color:#ffff66;
  font-size:12.5px;
  text-shadow:0 0 10px #ffff66;
}

/* BUTTONS */
.song-actions{
  display:flex;
  gap:6px;
}

.play{
  background:#00ccff;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 10px #00ccff;
}

.stop{
  background:#ff2b2b;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 10px #ff2b2b;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="container">
<div class="box" style="background-image:url('https://xatimg.com/image/Kn9aywnuvpVo.jpg');"></div>
<div class="box" style="background-image:url('https://xatimg.com/image/RKBN2koMEBaq.jpg');"></div>
<div class="box" style="background-image:url('https://xatimg.com/image/La8VreHLPDME.jpg');"></div>
</div>

<!-- MAIN -->
<div class="data-section">

<div class="big-box">

<!-- LEFT -->
<div class="left-side">

  <div class="profile">
    <img src="https://xatimg.com/image/mr0HaGwQtzx2.png">
    <div class="name">RAMY</div>
  </div>

  <!-- RADIOS -->
  <div class="radio-box">
    <h4>📖 Quran Radio</h4>
    <button class="radio-btn quran" onclick="toggleRadio('quran')">PLAY / STOP</button>
  </div>

  <div class="radio-box">
    <h4>🎧 Music Radio</h4>
    <button class="radio-btn music" onclick="toggleRadio('music')">PLAY / STOP</button>
  </div>

  <!-- CHATS -->
  <div class="chat-links">
    <a href="https://xat.com/2ra" target="_blank">2RA</a>
    <a href="https://xat.com/7reqa" target="_blank">7REQA</a>
    <a href="https://xat.com/trade" target="_blank">TRADE</a>
    <a href="https://xat.com/cambio" target="_blank">CAMBIO</a>
  </div>

</div>

<!-- RIGHT -->
<div class="right-side">

<div class="songs-inner">

<div class="songs-title">🎵 songs</div>

<div class="songs-grid">

<!-- COL 1 -->
<div class="songs-col">

<div class="song-row"><span class="song-name">نفسي أطمن بيك</span><div class="song-actions"><button class="play" onclick="playSong(0)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">الشعر الأسود</span><div class="song-actions"><button class="play" onclick="playSong(1)">▶</button><button class="stop" onclick="stopSong()"></button></div></div>
<div class="song-row"><span class="song-name">حبي الأولاني</span><div class="song-actions"><button class="play" onclick="playSong(2)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>

</div>

<!-- COL 2 -->
<div class="songs-col">

<div class="song-row"><span class="song-name">لسه</span><div class="song-actions"><button class="play" onclick="playSong(10)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">مش زي غيرها</span><div class="song-actions"><button class="play" onclick="playSong(11)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>

</div>

</div>

</div>

</div>

</div>

<!-- AUDIO -->
<audio id="audio"></audio>

<audio id="quran" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="music" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>

<script>

let audio = document.getElementById("audio");
let quran = document.getElementById("quran");
let music = document.getElementById("music");
let current = null;

/* SONGS */
const songs = [
"https://j.top4top.io/m_3769le8x51.mp3",
"https://k.top4top.io/m_3769enq6z2.mp3",
"https://l.top4top.io/m_3769auk3d3.mp3",
"https://a.top4top.io/m_3769kdadn4.mp3",
"https://b.top4top.io/m_3769kg8sd5.mp3",
"https://c.top4top.io/m_3769ien0c6.mp3",
"https://d.top4top.io/m_3769yw3257.mp3",
"https://e.top4top.io/m_3769yb3k29.mp3",
"https://f.top4top.io/m_37690zriz10.mp3",
"https://b.top4top.io/m_3769lxi681.mp3",
"https://c.top4top.io/m_3769g0kg52.mp3"
];

/* PLAY SONG */
function playSong(i){
  stopSong();
  audio.src = songs[i];
  audio.play();
  current = i;
}

/* STOP SONG */
function stopSong(){
  audio.pause();
  audio.currentTime = 0;
  current = null;
}

/* RADIOS */
function toggleRadio(type){

  if(type === "quran"){
    music.pause();
    quran.paused ? quran.play() : quran.pause();
  }

  if(type === "music"){
    quran.pause();
    music.paused ? music.play() : music.pause();
  }
}

</script>

</body>
</html>
