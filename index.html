<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* ===================== */
/* TOP IMAGES */
/* ===================== */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.box{
  width:100%;
  aspect-ratio:4/3;
  border-radius:14px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.04);
}

/* ===================== */
/* BIG BOX */
/* ===================== */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:600px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 20px rgba(0,255,204,0.2);
  padding:20px;
}

/* ===================== */
/* PROFILE HEADER */
/* ===================== */
.profile-header{
  display:flex;
  gap:20px;
  align-items:flex-start;
}

/* IMAGE */
.avatar img{
  width:140px;
  height:140px;
  border-radius:50%;
  border:2px solid #00ffcc;
  box-shadow:0 0 15px #00ffcc;
}

/* NAME */
.name{
  font-size:22px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:1; text-shadow:0 0 5px #00ffcc;}
  50%{opacity:0.6; text-shadow:0 0 20px #00ffcc;}
  100%{opacity:1; text-shadow:0 0 5px #00ffcc;}
}

/* RADIOS */
.radios{
  display:flex;
  gap:15px;
  margin-top:10px;
}

.radio-box{
  padding:10px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
  background:rgba(0,255,204,0.05);
}

.radio-box h4{
  margin:0 0 5px 0;
  font-size:13px;
}

/* CONTROL BUTTON */
.control{
  margin-top:15px;
}

.control button{
  padding:15px 10px;
  border:none;
  background:#00ffcc;
  color:#000;
  font-weight:bold;
  border-radius:8px;
  writing-mode:vertical-rl;
  cursor:pointer;
  box-shadow:0 0 10px #00ffcc;
}

.control button:hover{
  background:#00ffaa;
}

/* LINKS */
.links{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.links a{
  color:#00ffcc;
  text-decoration:none;
  padding:6px 10px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:6px;
  font-size:12px;
}

.links a:hover{
  background:rgba(0,255,204,0.1);
}

</style>
</head>

<body>

<!-- TOP IMAGES -->
<div class="container">

<div class="box" style="background-image:url('https://xatimg.com/image/Kn9aywnuvpVo.jpg');"></div>

<div class="box" style="background-image:url('https://xatimg.com/image/RKBN2koMEBaq.jpg');"></div>

<div class="box" style="background-image:url('https://xatimg.com/image/La8VreHLPDME.jpg');"></div>

</div>

<!-- BIG SECTION -->
<div class="data-section">

<div class="big-box">

  <!-- PROFILE -->
  <div class="profile-header">

    <!-- IMAGE -->
    <div class="avatar">
      <img src="https://xatimg.com/image/mr0HaGwQtzx2.png">
    </div>

    <!-- INFO -->
    <div class="info">

      <div class="name">RAMY</div>

      <!-- RADIOS -->
      <div class="radios">

        <div class="radio-box">
          <h4>📖 Quran Radio</h4>
          <audio id="quran" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
        </div>

        <div class="radio-box">
          <h4>🎧 Music Radio</h4>
          <audio id="music" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>
        </div>

      </div>

      <!-- BUTTON -->
      <div class="control">
        <button onclick="toggleAll()">PLAY / STOP</button>
      </div>

    </div>
  </div>

  <!-- LINKS -->
  <div class="links">
    <a href="https://xat.com/2ra" target="_blank">2ra</a>
    <a href="https://xat.com/7reqa" target="_blank">7reqa</a>
    <a href="https://xat.com/trade" target="_blank">trade</a>
    <a href="https://xat.com/cambio" target="_blank">cambio</a>
  </div>

</div>

</div>

<script>

let playing = false;

function toggleAll(){
  let q = document.getElementById("quran");
  let m = document.getElementById("music");

  if(!playing){
    q.play();
    m.play();
    playing = true;
  }else{
    q.pause();
    m.pause();
    playing = false;
  }
}

</script>

</body>
</html>
