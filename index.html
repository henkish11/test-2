<style>
body{
margin:0;
background:#000;
font-family:Arial;
color:#00ffcc;

}

/* FULL SCREEN */
.wrap{
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.big{
width:98vw;
height:98vh;
background:rgba(0,255,204,0.05);
border-radius:15px;
box-shadow:0 0 25px rgba(0,255,204,0.2);
padding:12px;
display:flex;
flex-direction:column;
}

/* TOP IMAGES (🔥 BIGGER NOW) */
.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
height:22vh; /* ⬆️ كان أصغر */
}

.box{
border-radius:10px;
background-size:cover;
background-position:center;
border:1px solid rgba(0,255,204,0.2);
box-shadow:0 0 14px rgba(0,255,204,0.25);
}

/* CONTENT */
.content{
flex:1;
display:flex;
gap:15px;
margin-top:10px;
}

/* LEFT */
.left{
width:28%;
border-right:1px solid rgba(0,255,204,0.2);
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.profile img{
width:85px;
height:85px;
border-radius:50%;
border:3px solid #00ffcc;
box-shadow:0 0 20px #00ffcc;
}

.name{
font-size:38px;
}

/* CHAT */
.chat a{
display:block;
margin-top:5px;
padding:6px;
text-decoration:none;
color:#00ffcc;
border:1px solid rgba(0,255,204,0.3);
text-align:center;
border-radius:6px;
}

/* SONG GRID (🔻 SMALLER BOXES) */
.song-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:4px; /* ⬅️ أصغر */
}

/* SONG BOX */
.song{
display:flex;
justify-content:space-between;
align-items:center;
padding:5px; /* ⬅️ أصغر */
border-radius:8px;
background:rgba(255,255,255,0.02);
border:1px solid rgba(255,255,0,0.12);
}

/* SONG NAME (💡 FIXED: glow only not blinking) */
.song span{
color:#ffff66;
text-shadow:0 0 8px #ffff66;
}

/* BUTTONS (TOGETHER FIXED) */
.btns{
display:flex;
gap:4px;
}

button{
border:none;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
}

.play{
background:#00ccff;
box-shadow:0 0 8px #00ccff;
}

.stop{
background:#ff2b2b;
box-shadow:0 0 8px #ff2b2b;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:5px 10px;
}

.by{
color:#00ff66;
text-shadow:0 0 12px #00ff66;
}

/* MEDIA */
.media{
margin-top:8px;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-radius:12px;
border:1px solid rgba(0,255,204,0.3);
}

.media input{width:35%;}
</style>
</head>
