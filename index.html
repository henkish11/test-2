<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Profile - GOD SYSTEM V2</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: radial-gradient(circle at top,#010514,#020617);
  color:#fff;
  overflow:hidden;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(12px);
  z-index:50;
}
.login-box{
  width:300px;
  padding:18px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}
.login-box input{
  width:100%;
  margin:8px 0;
  padding:9px;
  background:#0f172a;
  border:none;
  color:#fff;
  border-radius:8px;
}
.login-box button{
  width:100%;
  padding:9px;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
  border:none;
  color:#fff;
  cursor:pointer;
  border-radius:8px;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  padding:8px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:10;
  font-size:13px;
}

.status{color:#38bdf8}

/* MAIN */
.container{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}

.profile{
  width:900px;
  max-width:95%;
  background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
  backdrop-filter:blur(18px);
  box-shadow:0 0 50px rgba(0,140,255,0.25);
}

/* TOP */
.top{
  display:flex;
  gap:15px;
  align-items:center;
}

.top img{
  width:100px;
  height:100px;
  border-radius:50%;
  border:2px solid #00c3ff;
}

.name{
  font-size:32px;
  font-weight:700;
  color:#4fc3ff;
}

/* INFO */
.grid{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:15px;
  font-size:13px;
}

/* LINKS */
.world{
  display:block;
  padding:10px;
  border-radius:10px;
  background:rgba(0,195,255,0.1);
  text-decoration:none;
  color:#fff;
  font-size:13px;
}

/* CHAT */
.chat{
  margin-top:15px;
  background:rgba(0,0,0,0.4);
  border-radius:12px;
  overflow:hidden;
}

.chat-header{
  padding:8px;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
  font-size:12px;
}

.chat-msgs{
  height:160px;
  overflow-y:auto;
  padding:8px;
  font-size:12px;
}

.chat-input{
  display:flex;
}

.chat-input input{
  flex:1;
  padding:6px;
  border:none;
  background:#0f172a;
  color:#fff;
}

.chat-input button{
  padding:6px;
  border:none;
  background:#38bdf8;
  cursor:pointer;
}

/* MESSAGE */
.msg{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 0;
  padding:5px;
  background:rgba(255,255,255,0.05);
  border-radius:6px;
}

.actions button{
  margin-left:4px;
  border:none;
  font-size:10px;
  cursor:pointer;
  padding:2px 5px;
  border-radius:4px;
}

.edit{background:orange;}
.del{background:red;}

#audioPlayer{display:none;}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h3>ACCESS</h3>
    <input id="password" type="password" placeholder="Enter password">
    <button onclick="enter()">Enter</button>
  </div>
</div>

<div class="topbar">
  <div class="status" id="status">⚡ OFFLINE</div>
  <div>GOD SYSTEM V2</div>
</div>

<div class="container">
<div class="profile">

<!-- TOP -->
<div class="top">
<img src="https://xatimg.com/image/RKP5IrStF45l.png">
<div>
<div class="name">Ramy</div>
<div>@iegypt • ID: 106080</div>
</div>
</div>

<!-- INFO -->
<div class="grid">
<div class="card">⚡ I love trading on the xat website</div>
<div class="card">❤️ I got involved with Dolly and she's my whole life ❤️</div>
</div>

<!-- LINKS -->
<div class="grid">
<div class="card">https://xat.com/2ra</div>
<div class="card">https://xat.com/7reqa</div>
<div class="card">https://xat.com/trade</div>
<div class="card">https://xat.com/cambio</div>
</div>

<!-- CHAT -->
<div class="chat">

<div class="chat-header">Chat</div>

<div class="chat-msgs" id="msgs"></div>

<div class="chat-input">
<input id="msg" placeholder="Write message...">
<button onclick="send()">Send</button>
</div>

</div>

</div>
</div>

<script>

// LOGIN FUNCTION
function enter(){
  let p=document.getElementById('password').value;

  if(p==="106080"){
    document.getElementById('login').style.display='none';
    document.getElementById('status').innerText='⚡ ONLINE';
  } else {
    alert("Wrong password");
  }
}

// 👇 ENTER KEY LOGIN (NEW FIX)
document.getElementById("password").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    enter();
  }
});

// CHAT (LOCAL)
function send(){
  let m=document.getElementById('msg');
  if(!m.value)return;

  let d=document.createElement("div");
  d.className="msg";
  d.textContent="You: "+m.value;

  document.getElementById("msgs").appendChild(d);
  m.value="";
}

// BG
const c=document.getElementById('bg');
const x=c.getContext('2d');
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<60;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function a(){
  x.clearRect(0,0,c.width,c.height);
  x.fillStyle="#38bdf8";
  p.forEach(o=>{
    x.beginPath();
    x.arc(o.x,o.y,o.r,0,6.28);
    x.fill();
  });
  requestAnimationFrame(a);
}
a();

</script>

</body>
</html>
