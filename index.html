<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramy Profile - GOD SYSTEM V2</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: radial-gradient(circle at top,#010514,#020617);
  color:#fff;
  overflow:hidden;
}

canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(12px);
  z-index:50;
}
.login-box{
  width:300px;
  padding:18px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}
.login-box input{
  width:100%;
  margin:8px 0;
  padding:9px;
  background:#0f172a;
  border:none;
  color:#fff;
  border-radius:8px;
}
.login-box button{
  width:100%;
  padding:9px;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
  border:none;
  color:#fff;
  cursor:pointer;
  border-radius:8px;
}

/* MAIN */
.container{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.profile{
  width:900px;
  max-width:95%;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
}

/* CHAT */
.chat{
  margin-top:15px;
  background:rgba(0,0,0,0.4);
  border-radius:12px;
  overflow:hidden;
}

.chat-header{
  padding:8px;
  background:linear-gradient(45deg,#0ea5e9,#1e3a8a);
  font-size:12px;
}

.chat-msgs{
  height:180px;
  overflow-y:auto;
  padding:8px;
  font-size:12px;
}

.chat-input{
  display:flex;
}

.chat-input input{
  flex:1;
  padding:6px;
  border:none;
  background:#0f172a;
  color:#fff;
}

.chat-input button{
  padding:6px;
  border:none;
  background:#38bdf8;
  cursor:pointer;
}

/* MESSAGE BOX */
.msg{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:4px 0;
  padding:5px;
  background:rgba(255,255,255,0.05);
  border-radius:6px;
}

.actions button{
  margin-left:4px;
  border:none;
  font-size:10px;
  cursor:pointer;
  padding:2px 5px;
  border-radius:4px;
}

.edit{background:orange;}
.del{background:red;}

#audioPlayer{display:none;}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<audio id="audioPlayer" loop>
  <source src="https://stream.radiojar.com/8s5u5tpdtwzuv" type="audio/mpeg">
</audio>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h3>ACCESS</h3>
    <input id="password" type="password">
    <button onclick="enter()">Enter</button>
  </div>
</div>

<div class="container">
<div class="profile">

<div class="chat">
<div class="chat-header">Public Chat</div>

<div style="display:flex;gap:5px;padding:5px;">
<input id="username" placeholder="Your name"
style="flex:1;padding:6px;border:none;background:#0f172a;color:#fff;border-radius:6px;">
</div>

<div class="chat-msgs" id="msgs"></div>

<div class="chat-input">
<input id="msg" placeholder="Write message...">
<button onclick="send()">Send</button>
</div>

</div>

</div>
</div>

<script>

let OWNER_PASS = "106080"; // أنت الأدمن

function enter(){
  let p=document.getElementById('password').value;

  if(p===OWNER_PASS){
    document.getElementById('login').style.display='none';
  } else {
    alert("Wrong password");
  }
}

// LOAD
function loadMsgs(){
  let msgs = JSON.parse(localStorage.getItem("msgs") || "[]");
  let box = document.getElementById("msgs");
  box.innerHTML="";

  msgs.forEach((m,i)=>{
    let div=document.createElement("div");
    div.className="msg";

    let text=document.createElement("span");
    text.textContent = m.name + ": " + m.text;

    let actions=document.createElement("div");
    actions.className="actions";

    // EDIT (only owner or message owner)
    let edit=document.createElement("button");
    edit.className="edit";
    edit.textContent="✏";

    edit.onclick=()=>{
      let newText = prompt("Edit message:", m.text);
      if(newText){
        msgs[i].text = newText;
        localStorage.setItem("msgs", JSON.stringify(msgs));
        loadMsgs();
      }
    };

    // DELETE (owner OR message owner)
    let del=document.createElement("button");
    del.className="del";
    del.textContent="🗑";

    del.onclick=()=>{
      let isOwner = document.getElementById('password').value === OWNER_PASS;
      let isSender = true; // local demo

      if(isOwner || isSender){
        msgs.splice(i,1);
        localStorage.setItem("msgs", JSON.stringify(msgs));
        loadMsgs();
      }
    };

    actions.appendChild(edit);
    actions.appendChild(del);

    div.appendChild(text);
    div.appendChild(actions);

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

// SEND
function send(){
  let m=document.getElementById('msg');
  let u=document.getElementById('username');

  if(!m.value)return;

  let msgs = JSON.parse(localStorage.getItem("msgs") || "[]");

  msgs.push({
    name: u.value || "Guest",
    text: m.value
  });

  localStorage.setItem("msgs", JSON.stringify(msgs));

  m.value="";
  loadMsgs();
}

// ENTER SEND
document.addEventListener("keydown",e=>{
  if(e.key==="Enter" && document.activeElement.id==="msg"){
    send();
  }
});

loadMsgs();

// BG
const c=document.getElementById('bg');
const x=c.getContext('2d');
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<60;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function a(){
  x.clearRect(0,0,c.width,c.height);
  x.fillStyle="#38bdf8";
  p.forEach(o=>{
    x.beginPath();
    x.arc(o.x,o.y,o.r,0,6.28);
    x.fill();
  });
  requestAnimationFrame(a);
}
a();

</script>

</body>
</html>
