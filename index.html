<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle at center, #050505, #000);
  font-family:Arial;
  color:#00ffcc;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:20px;
}

/* BOX STYLE (Neon) */
.box{
  position:relative;
  border-radius:15px;
  background:rgba(0,255,204,0.05);
  backdrop-filter: blur(5px);
  overflow:hidden;
  height:230px;
  box-shadow:
    0 0 10px #00ffcc,
    0 0 20px #00ffcc40,
    inset 0 0 10px #00ffcc20;
  transition:0.3s;
}

/* Glow Animation */
.box::before{
  content:"";
  position:absolute;
  width:150%;
  height:150%;
  background:linear-gradient(45deg,transparent,#00ffcc,transparent);
  top:-50%;
  left:-50%;
  animation:rotate 6s linear infinite;
}

@keyframes rotate{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* inner content */
.box::after{
  content:"";
  position:absolute;
  inset:2px;
  background:#000;
  border-radius:13px;
}

/* content fix */
.box *{
  position:relative;
  z-index:2;
}

/* Hover Effect */
.box:hover{
  transform:scale(1.05);
  box-shadow:
    0 0 20px #00ffcc,
    0 0 40px #00ffcc;
}

/* TITLE */
h3{
  margin:10px;
  text-align:center;
  letter-spacing:2px;
  text-shadow:0 0 10px #00ffcc;
}

/* MUSIC */
.music{
  padding:10px;
}

/* SONG */
.song{
  display:flex;
  justify-content:space-between;
  padding:6px;
  border-bottom:1px solid rgba(0,255,204,0.2);
  cursor:pointer;
  font-size:13px;
  transition:0.2s;
}

.song:hover{
  background:#00ffcc20;
  transform:translateX(5px);
}

/* PLAYER */
audio{
  width:100%;
  margin-top:10px;
  filter:drop-shadow(0 0 5px #00ffcc);
}

</style>
</head>

<body>

<div class="container">

<!-- MUSIC BOX -->
<div class="box music">
<h3>🎧 MUSIC PLAYER</h3>
<div id="list"></div>
<audio id="player" controls></audio>

</script>

</body>
</html>
