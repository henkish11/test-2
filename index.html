<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

/* BOX = صورة */
.box{
  position:relative;
  width:100%;
  aspect-ratio:1/1; /* يخليهم مربعات */
  border-radius:12px;
  overflow:hidden;
  background-size:cover;
  background-position:center;
  box-shadow:0 0 15px rgba(0,255,204,0.3);
}

/* Hover */
.box:hover{
  transform:scale(1.03);
  transition:0.3s;
}

/* PASSWORD PANEL */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

/* INPUT */
input{
  padding:10px;
  border:none;
  outline:none;
  border-radius:6px;
  background:#111;
  color:#00ffcc;
  text-align:center;
  box-shadow:0 0 10px #00ffcc;
}

/* BUTTON */
button{
  padding:8px 20px;
  border:none;
  border-radius:6px;
  background:#00ffcc;
  color:#000;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00ffaa;
}

/* hidden content */
.hidden{
  display:none;
}

</style>
</head>

<body>

<div class="container">

<!-- BOX 1 -->
<div class="box" style="background-image:url('https://xatimg.com/image/Kn9aywnuvpVo.jpg');"></div>

<!-- BOX 2 -->
<div class="box" style="background-image:url('https://xatimg.com/image/RKBN2koMEBaq.jpg');"></div>

<!-- BOX 3 (Password) -->
<div class="box" style="background-image:url('https://xatimg.com/image/La8VreHLPDME.jpg');">

  <div class="overlay" id="lock">
    <input type="password" id="pass" placeholder="ENTER PASSWORD">
    <button onclick="unlock()">ENTER</button>
  </div>

</div>

</div>

<script>

function unlock(){
  let p = document.getElementById("pass").value;

  if(p === "1234"){ // غير الباسورد من هنا
    document.getElementById("lock").style.display = "none";
  }else{
    alert("Wrong Password ❌");
  }
}

</script>

</body>
</html>
