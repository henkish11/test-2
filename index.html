.wrap{

}

.neon{
animation:glow 2s infinite;
}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);

height:18vh;
}

.box{

.left{

}

.profile{
display:flex;
align-items:center;

}

height:85px;

}

.name{

.chat a{

border-radius:6px;
}

.song-grid{

gap:6px;
}

.song{

justify-content:space-between;
align-items:center;
padding:8px;
border-radius:10px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,0,0.15);
}

.song span{
color:#ffff66;
}

button{
border:none;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
}

.play{background:#00ccff;box-shadow:0 0 10px #00ccff;}
.stop{background:#ff2b2b;box-shadow:0 0 10px #ff2b2b;}

.header{
display:flex;
justify-content:space-between;
padding:5px 10px;
}

.by{
color:#00ff66;
text-shadow:0 0 15px #00ff66;
}

.media{

display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-radius:12px;
border:1px solid rgba(0,255,204,0.3);
}

.media input{width:35%;}
</style>
</head>

});
