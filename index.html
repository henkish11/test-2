<!DOCTYPE html>

<title>RAMY SYSTEM v2.0</title>

<style>
body{
margin:0;
background:#020b0f;
font-family:Arial;
color:#00ffcc;  
}
.radio-title{
color:#ffffff;
font-weight:bold;
letter-spacing:2px;

/* نور أبيض */
text-shadow:0 0 5px #fff, 0 0 15px #fff, 0 0 25px #fff;

/* اهتزاز + نبض */
animation:radioGlowShake 1.2s infinite ease-in-out;
}

/* حركة + وميض */
@keyframes radioGlowShake{
0%{
opacity:0.4;
transform:translateX(0px) scale(0.95);
text-shadow:0 0 5px #fff;
}
25%{
transform:translateX(-2px);
}
50%{
opacity:1;
transform:translateX(2px) scale(1.05);
text-shadow:0 0 15px #fff, 0 0 30px #fff;
}
75%{
transform:translateX(-1px);
}
100%{
opacity:0.4;
transform:translateX(0px) scale(0.95);
text-shadow:0 0 5px #fff;
}
}  
.glow-text{
color:#00ffcc;
font-weight:bold;
letter-spacing:2px;
margin:0 6px;

text-shadow:0 0 5px #00ffcc, 0 0 15px #00ffcc;
animation:glowPulse 1.2s infinite ease-in-out;
}

/* نفس النبض للاتنين */
@keyframes glowPulse{
0%{
opacity:0.3;
transform:scale(0.95);
}
50%{
opacity:1;
transform:scale(1.05);
}
100%{
opacity:0.3;
transform:scale(0.95);
}
}  
}

/* نبض */
@keyframes ramyPulse{
0%{
opacity:0.3;
transform:scale(0.95);
}
50%{
opacity:1;
transform:scale(1.05);
}
100%{
opacity:0.3;
transform:scale(0.95);
}
}  
/* تأثير الهوفر الذهبي */
.hover-gold{
transition:all 0.3s ease;
}

/* عند المرور */
.hover-gold:hover{
transform:scale(1.05);

/* نور ذهبي */
box-shadow:
0 0 10px #ffd700,
0 0 20px #ffd700,
0 0 40px #ffcc00;

/* لمعان خفيف */
filter:brightness(1.2);
}
/* TOP */
.top{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}
.gold-hover{
transition:all 0.25s ease;
}

.gold-hover:hover{
transform:scale(1.07);
box-shadow:0 0 10px #ffd700, 0 0 20px #ffd700, 0 0 40px #ffcc00;
filter:brightness(1.2);
border-color:#ffd700;
color:#fff;
text-shadow:0 0 10px #ffd700, 0 0 20px #ffd700;
}

/* Animation */
@keyframes ramyPulse{
0%{
opacity:0.4;
text-shadow:0 0 5px #00ffcc;
}
100%{
opacity:1;
text-shadow:0 0 15px #00ffcc, 0 0 30px #00ffcc;
}
}
  
.card{
height:160px;
border-radius:12px;
background-size:cover;
background-position:center;
box-shadow:0 0 25px #00ffff55;
border:1px solid #00ffff44;
}

/* MAIN */
.main{
display:flex;
gap:10px;
padding:10px;
}

/* LEFT */
.left{
width:280px;
background:#03141a;
border:1px solid #00ffcc33;
border-radius:12px;
padding:15px;
box-shadow:0 0 15px #00ffcc22;
}

.profile{
display:flex;
align-items:center;
gap:12px;
padding-left:5px; /* تزقيه يمين بسيط */
}

.profile img{
width:70px;
height:70px;
border-radius:50%;

border:2px solid #00ffcc;

/* نور قوي */
box-shadow:
0 0 10px #00ffcc,
0 0 20px #00ffcc,
0 0 40px #00ffcc;

/* حركة + نبض */
animation:avatarPulse 1.5s infinite ease-in-out;
}

.name{
font-size:28px;
color:#00ff88;
}

.status{
font-size:12px;
color:#00ff88;
}

.section{
margin-top:15px;
font-size:18px;
color:#00ffaa;
}

/* RADIO */
.radio button{
width:48%;
padding:8px;
margin-top:8px;
border:none;
border-radius:8px;
cursor: url("https://cur.cursors-4u.net/cursors/cur-9/cur817.cur"), pointer;
font-weight:bold;
}

.quran{background:#00aa55;}
.music{background:#5522aa;color:#fff;}

/* CHAT */
.chat a{
display:block;
margin-top:10px;
padding:10px;
border:1px solid #00ffcc33;
border-radius:8px;
text-decoration:none;

/* تكبير الخط */
font-size:18px;
font-weight:bold;
letter-spacing:1px;

/* RGB */
animation: chatRGB 3s infinite linear;

/* Glow */
text-shadow:
0 0 5px currentColor,
0 0 10px currentColor,
0 0 20px currentColor,
0 0 30px currentColor;

/* حركة ناعمة */
transition:0.3s;
}

/* حركة الألوان */
@keyframes chatRGB{
0%{color:#00ffcc;}
20%{color:#00aaff;}
40%{color:#ff00ff;}
60%{color:#ff0033;}
80%{color:#ffee00;}
100%{color:#00ffcc;}
}

/* Hover أقوى */
.chat a:hover{
transform:scale(1.08);
box-shadow:
0 0 10px currentColor,
0 0 20px currentColor,
0 0 40px currentColor;
}

/* RIGHT */
.right{
flex:1;
background:#03141a;
border-radius:12px;
padding:10px;
border:1px solid #00ffcc33;
}

.title{
text-align:center;
font-size:20px;
margin-bottom:10px;
}

/* SONGS */
.songs-wrap{
display:flex;
gap:10px;
}

.col{
flex:1;
}

.song{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 14px;
margin:6px 0;
border-bottom:1px solid #00ffcc22;
}

.song div{
display:flex;
gap:10px; /* 👈 دي الفاصلة بين ▶ و ■ */
align-items:center;
}

.song span{
font-size:18px; /* تكبير الخط */
font-weight:bold;
letter-spacing:1px;

/* ألوان بتتقلب */
animation: songRGB 3s infinite linear;

/* إضاءة قوية */
text-shadow:
0 0 5px currentColor,
0 0 10px currentColor,
0 0 20px currentColor,
0 0 40px currentColor;

/* نعومة */
transition:0.3s;
}

/* حركة RGB */
@keyframes songRGB{
0%{color:#00ffcc;}
20%{color:#00aaff;}
40%{color:#ff00ff;}
60%{color:#ff0033;}
80%{color:#ffee00;}
100%{color:#00ffcc;}
}

/* BUTTONS */
.play{
background:#0088ff;
border:none;
padding:5px 10px;
border-radius:6px;
color:#fff;
cursor:pointer;
transition:all 0.2s ease;
}

.play:hover{
transform:scale(1.2);
box-shadow:0 0 10px #0088ff;
}

.stop{
background:#ff2222;
border:none;
padding:5px 10px;
border-radius:6px;
color:#fff;
cursor:pointer;
transition:all 0.2s ease;
}

.stop:hover{
transform:scale(1.2);
box-shadow:0 0 10px #ff2222;
}
/* PLAYER */
.player{
margin:10px;
padding:10px;
border:1px solid #00ffcc33;
border-radius:12px;
display:flex;
align-items:center;
gap:10px;
background:#021017;
}

.bigplay{
width:60px;
height:60px;
border-radius:50%;
background:#021017;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
cursor:pointer;
color:#00ffcc;

/* Glow */
box-shadow:0 0 10px #00ffcc, 0 0 20px #00ffcc inset;

/* Animation */
animation:pulse 1s infinite alternate;
}

/* النبض */
@keyframes pulse{
from{
opacity:0.5;
box-shadow:0 0 5px #00ffcc;
}
to{
opacity:1;
box-shadow:0 0 20px #00ffcc, 0 0 40px #00ffcc;
}
}

/* شكل عام */
input[type=range]{
flex:1;
-webkit-appearance:none;
appearance:none;
height:6px;
border-radius:10px;
outline:none;

/* ألوان متحركة */
background:linear-gradient(90deg, #00ffcc, #00aaff, #ff00ff, #ffee00);
background-size:300%;

/* حركة RGB */
animation: sliderRGB 4s linear infinite;

/* Glow */
box-shadow:0 0 10px #00ffcc;
}

/* الحركة */
@keyframes sliderRGB{
0%{background-position:0%;}
100%{background-position:300%;}
}

/* الدائرة (المؤشر) */
input[type=range]::-webkit-slider-thumb{
-webkit-appearance:none;
width:18px;
height:18px;
border-radius:50%;
background:#fff;
cursor:pointer;

/* Glow قوي */
box-shadow:
0 0 10px #00ffcc,
0 0 20px #00ffcc,
0 0 30px #00ffcc;

/* تكبير بسيط */
transition:0.2s;
}

/* Hover */
input[type=range]::-webkit-slider-thumb:hover{
transform:scale(1.2);
box-shadow:
0 0 15px #ff00ff,
0 0 30px #ff00ff,
0 0 50px #ff00ff;
}

.footer{
text-align:center;
padding:10px;
color:#00ffcc;
}
.songs-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
margin-bottom:10px;
border:1px solid #00ffcc33;
border-radius:10px;
background:#021017;
box-shadow:0 0 15px #00ffcc22;
}

.songs-left,
.songs-right{
font-weight:bold;
letter-spacing:2px;

/* RGB ألوان بتلف */
animation:rgbShift 2s infinite linear;

/* Glow حي */
text-shadow:0 0 10px currentColor, 0 0 20px currentColor;
}

/* تغيير الألوان */
@keyframes rgbShift{
0%{color:#00ffcc;}
20%{color:#00aaff;}
40%{color:#ff00ff;}
60%{color:#ff0033;}
80%{color:#ffee00;}
100%{color:#00ffcc;}
}

/* نفس النبض */
@keyframes glowPulse{
0%{opacity:0.4; transform:scale(0.95);}
50%{opacity:1; transform:scale(1.05);}
100%{opacity:0.4; transform:scale(0.95);}
}  
@keyframes avatarPulse{
0%{
transform:scale(0.95) translateY(0px);
box-shadow:0 0 10px #00ffcc;
opacity:0.7;
}

50%{
transform:scale(1.05) translateY(-3px);
box-shadow:0 0 25px #00ffcc, 0 0 40px #00ffcc;
opacity:1;
}

100%{
transform:scale(0.95) translateY(0px);
box-shadow:0 0 10px #00ffcc;
opacity:0.7;
}
}
.info-move{
animation: moveSide 2s infinite ease-in-out;
display:flex;
flex-direction:column;
}

@keyframes moveSide{
0%{transform:translateX(0px);}
50%{transform:translateX(8px);}
100%{transform:translateX(0px);}
} 
body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;

/* إطار مضيء حوالين الشاشة */
box-shadow:
inset 0 0 40px rgba(0,255,204,0.3),
inset 0 0 80px rgba(0,255,204,0.2),
0 0 60px rgba(0,255,204,0.15);

/* حركة ألوان */
animation: rgbBorder 6s infinite linear;
mix-blend-mode: screen;
}

@keyframes rgbBorder{
0%{
filter:hue-rotate(0deg);
box-shadow:
inset 0 0 40px rgba(0,255,204,0.3),
0 0 60px rgba(0,255,204,0.15);
}

25%{
box-shadow:
inset 0 0 40px rgba(255,0,150,0.3),
0 0 60px rgba(255,0,150,0.15);
}

50%{
box-shadow:
inset 0 0 40px rgba(0,150,255,0.3),
0 0 60px rgba(0,150,255,0.15);
}

75%{
box-shadow:
inset 0 0 40px rgba(255,255,0,0.2),
0 0 60px rgba(255,255,0,0.15);
}

100%{
filter:hue-rotate(360deg);
box-shadow:
inset 0 0 40px rgba(0,255,204,0.3),
0 0 60px rgba(0,255,204,0.15);
}
}  
.volume-box{
display:flex;
align-items:center;
gap:8px;
color:#00ffcc;
font-size:18px;
padding:0 5px;

.volume-box input[type=range]{

.auto-play{
text-align:center;
margin:15px;
}

/* الزر الأساسي */
.auto-btn{
position:relative;
padding:12px 25px;
font-size:16px;
font-weight:bold;
letter-spacing:2px;

color:#fff;
background:#021017;
border:1px solid #00ffcc55;
border-radius:12px;
cursor:pointer;
overflow:hidden;

/* Glow */
box-shadow:
0 0 10px #00ffcc,
0 0 20px #00ffcc inset;

transition:0.3s;
}

/* خط RGB متحرك */
.auto-btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
270deg,
#00ffcc,
#ff00ff,
#00aaff,
#ffee00,
#ff0033
);
background-size:600% 600%;
animation:rgbMove 4s infinite linear;
opacity:0.3;
z-index:0;
}

/* النص فوق */
.auto-btn{
z-index:1;
}

/* Hover */
.auto-btn:hover{
transform:scale(1.1);
box-shadow:
0 0 20px #00ffcc,
0 0 40px #ff00ff,
0 0 60px #00aaff;
}

/* لما يشتغل */
.auto-btn.active{
color:#000;
background:#00ffcc;
box-shadow:
0 0 20px #00ffcc,
0 0 40px #00ffcc;
}

/* حركة الألوان */
@keyframes rgbMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}  
.auto-glow{
animation:autoGlow 1.2s infinite alternate;
}

@keyframes autoGlow{
0%{
box-shadow:0 0 10px #00ffcc, 0 0 20px #00ffcc;
color:#00ffcc;
}
50%{
box-shadow:0 0 20px #ff00ff, 0 0 40px #ff00ff;
color:#ff00ff;
}
100%{
box-shadow:0 0 20px #ffee00, 0 0 40px #ffee00;
color:#ffee00;
}
}  
/* نخلي الجسم كله ماوس عادي */
body{
cursor:default;
}

/* الأغاني */
.song{
cursor:pointer;
position:relative;
}

/* كسر الإحساس الافتراضي وإضافة Glow بصري */
.song:hover{
box-shadow:
0 0 10px #ffd700,
0 0 20px #ffd700,
0 0 40px #ffcc00;
}

/* Cursor دهبي وهمي (نبض بصري) */
body::after{
content:"✋";
position:fixed;
pointer-events:none;
font-size:22px;
color:#ffd700;
text-shadow:
0 0 10px #ffd700,
0 0 20px #ffd700,
0 0 40px #ffcc00;

/* مكانه يتبع الماوس */
transform:translate(-50%,-50%);

/* نبض */
animation:goldCursorPulse 0.8s infinite;
mix-blend-mode:screen;
z-index:999999;
}

/* حركة النبض */
@keyframes goldCursorPulse{
0%{
opacity:0.4;
transform:scale(0.9) translate(-50%,-50%);
}
50%{
opacity:1;
transform:scale(1.2) translate(-50%,-50%);
}
100%{
opacity:0.4;
transform:scale(0.9) translate(-50%,-50%);
}
}  
.song, a, button{
cursor: pointer;
}

/* تأثير hover فقط */
.song:hover{
box-shadow:
0 0 10px #ffd700,
0 0 20px #ffd700,
0 0 40px #ffcc00;
transition:0.3s;

.red-glow{
background:#220000;
color:#ff2b2b;
border:1px solid #ff2b2b;
box-shadow:0 0 10px #ff0000, 0 0 20px #ff0000;
text-shadow:0 0 10px #ff0000;

/* نبض */
animation:redPulse 1.2s infinite ease-in-out;
cursor:pointer;
}

.red-glow:hover{
transform:scale(1.08);
box-shadow:0 0 15px #ff0000, 0 0 35px #ff0000;
}

@keyframes redPulse{
0%{
opacity:0.6;
filter:brightness(1);
}
50%{
opacity:1;
filter:brightness(1.4);
}
100%{
opacity:0.6;
filter:brightness(1);
}
} 
.chat a{
color:#ff4fd8;
text-shadow:0 0 10px #ff4fd8;
border:1px solid #ff4fd833;
}

.chat a:hover{
box-shadow:0 0 15px #ff4fd8;
transform:scale(1.05);
}  
</style>
</head>

<div class="bigplay auto-glow" onclick="togglePlay()" id="mainBtn">▶</div>
<input type="range" id="progress" value="0" min="0" max="100">
<div class="volume-box">
  🔊
  <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>
</div>
  
<audio id="audio"></audio>

<script>
let audio=document.getElementById("audio");
let progress=document.getElementById("progress");
let volume=document.getElementById("volume");
let btn=document.getElementById("mainBtn");

/* SONGS */
const songs=[
"https://2u.pw/79BQj1",
"https://2u.pw/bWZrZR",
"https://2u.pw/JXlu6P",
"https://2u.pw/0nlO60",
"https://2u.pw/xxTuCT",
"https://2u.pw/w0fqur",
"https://2u.pw/bmZaL7",
"https://2u.pw/MIIxAH",
"https://2u.pw/rvHuMT",
"https://2u.pw/LibNJq",
"https://2u.pw/t39HHk",
"https://2u.pw/W2yDPi",
"https://2u.pw/gl98FX",
"https://2u.pw/GB7fYU",
"https://2u.pw/OOHGBx",
"https://2u.pw/RLiltR",
"https://2u.pw/jeHrHc",
"https://2u.pw/hVpdww",
"https://2u.pw/e74Z4h",
"https://2u.pw/rgOydb",
"https://2u.pw/hDOUEG",
"https://2u.pw/QAvwiC"
];

/* RADIO */
let radioUrls=[
"https://stream.radiojar.com/8s5u5tpdtwzuv",
"https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"
];

function playSong(i){

autoMode = false; // يقفل الأوتو لو ضغطت يدوي

audio.src = songs[i];
audio.load();
audio.play();
btn.innerText="⏸";

/* تلوين */
document.querySelectorAll(".song").forEach(el=>{
el.classList.remove("active-song");
});

document.querySelectorAll(".song")[i].classList.add("active-song");

currentIndex = i;
}

function radio(i){
audio.src=radioUrls[i];
audio.play();
btn.innerText="⏸";
}

function stop(){
audio.pause();
audio.currentTime=0;
btn.innerText="▶";
progress.value=0;
}


audio.addEventListener("timeupdate",()=>{
if(audio.duration){
progress.value=(audio.currentTime/audio.duration)*100;
}
});

progress.addEventListener("input",()=>{
if(audio.duration){
audio.currentTime=(progress.value/100)*audio.duration;
}
});

volume.addEventListener("input",()=>{
audio.volume=volume.value;
});
function stopRadio(){
audio.pause();
audio.currentTime=0;
btn.innerText="▶";
}  
// ================= AUTO PLAY SYSTEM =================


function playNextAuto(){
if(!autoMode) return;

/* تشغيل الأغنية */
audio.src = songs[currentIndex];
audio.load();
audio.play();
btn.innerText="⏸";

/* تلوين الأغنية */
document.querySelectorAll(".song").forEach(el=>{
el.classList.remove("active-song");
});

let current = document.querySelectorAll(".song")[currentIndex];
if(current){
current.classList.add("active-song");
}

/* بعد ما تخلص */
audio.onended = function(){
currentIndex++;

if(currentIndex >= songs.length){
currentIndex = 0;
}

playNextAuto();
};
} 

</script>

</body>
</html>
