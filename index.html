<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* ===================== */
/* TOP IMAGES */
/* ===================== */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.box{
  width:100%;
  aspect-ratio:4/3;
  border-radius:14px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.04);
}

/* ===================== */
/* BIG BOX */
/* ===================== */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:650px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 20px rgba(0,255,204,0.2);
  padding:20px;
}

/* ===================== */
/* TITLE */
/* ===================== */
.title{
  text-align:center;
  font-size:55px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 25px #00ffcc;
  margin-bottom:20px;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{opacity:1; text-shadow:0 0 10px #00ffcc;}
  50%{opacity:0.6; text-shadow:0 0 25px #00ffcc;}
  100%{opacity:1; text-shadow:0 0 10px #00ffcc;}
}

/* ===================== */
/* RADIOS */
/* ===================== */
.radio-grid{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:15px;
}

.radio-card{
  padding:15px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:10px;
  background:rgba(0,255,204,0.05);
  text-align:center;
  width:200px;
}

.radio-card h4{
  margin-bottom:10px;
}

.radio-card button{
  width:100%;
  padding:10px;
  border:none;
  background:#00ffcc;
  color:#000;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

.radio-card button:hover{
  background:#00ffaa;
}

/* ===================== */
/* LINKS (SHAT) */
/* ===================== */
.links{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:25px;
  flex-wrap:wrap;
}

.chat-btn{
  padding:10px 18px;
  border:1px solid rgba(0,255,204,0.4);
  border-radius:8px;
  text-decoration:none;
  color:#00ffcc;
  font-weight:bold;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 10px rgba(0,255,204,0.15);
  transition:0.3s;
  letter-spacing:1px;
}

.chat-btn:hover{
  background:#00ffcc;
  color:#000;
  box-shadow:0 0 20px #00ffcc;
  transform:translateY(-3px);
}

</style>
</head>

<body>

<!-- TOP IMAGES -->
<div class="container">

<div class="box" style="background-image:url('https://xatimg.com/image/Kn9aywnuvpVo.jpg');"></div>

<div class="box" style="background-image:url('https://xatimg.com/image/RKBN2koMEBaq.jpg');"></div>

<div class="box" style="background-image:url('https://xatimg.com/image/La8VreHLPDME.jpg');"></div>

</div>

<!-- BIG SYSTEM -->
<div class="data-section">

<div class="big-box">

  <!-- TITLE -->
  <div class="title">RAMY</div>

  <!-- RADIOS -->
  <div class="radio-grid">

    <div class="radio-card">
      <h4>📖 Quran Radio</h4>
      <button onclick="playRadio('quran')">PLAY / STOP</button>
    </div>

    <div class="radio-card">
      <h4>🎧 Music Radio</h4>
      <button onclick="playRadio('music')">PLAY / STOP</button>
    </div>

  </div>

  <!-- AUDIO -->
  <audio id="quran" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
  <audio id="music" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>

  <!-- LINKS -->
  <div class="links">
    <a class="chat-btn" href="https://xat.com/2ra" target="_blank">2RA</a>
    <a class="chat-btn" href="https://xat.com/7reqa" target="_blank">7REQA</a>
    <a class="chat-btn" href="https://xat.com/trade" target="_blank">TRADE</a>
    <a class="chat-btn" href="https://xat.com/cambio" target="_blank">CAMBIO</a>
  </div>

</div>

</div>

<script>

let current = null;

function playRadio(id){
  let q = document.getElementById("quran");
  let m = document.getElementById("music");

  if(id === "quran"){
    m.pause();
    m.currentTime = 0;

    if(q.paused){
      q.play();
      current = "quran";
    }else{
      q.pause();
      current = null;
    }
  }

  if(id === "music"){
    q.pause();
    q.currentTime = 0;

    if(m.paused){
      m.play();
      current = "music";
    }else{
      m.pause();
      current = null;
    }
  }
}

</script>

</body>
</html>
