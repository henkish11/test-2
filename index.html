<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle,#0a0f1f,#000);
  color:#00ffcc;
}

header{
  text-align:center;
  padding:20px;
  font-size:28px;
  letter-spacing:3px;
  text-shadow:0 0 10px #00ffcc;
}

.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.box{
  background:rgba(0,255,204,0.05);
  border:1px solid rgba(0,255,204,0.3);
  border-radius:15px;
  padding:12px;
  min-height:160px;
  box-shadow:0 0 15px rgba(0,255,204,0.1);
  position:relative;
  overflow:hidden;
}

textarea{
  width:100%;
  height:70px;
  background:#05060a;
  color:#00ffcc;
  border:1px solid #00ffcc;
}

button{
  background:#00ffcc;
  border:none;
  padding:6px 10px;
  margin:4px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.small{font-size:12px;opacity:0.8}
</style>
</head>

<body>

<header>RAMY SYSTEM</header>

<div class="container">

<!-- 1 AI (BACKGROUND PANEL) -->
<div class="box"
style="
background:url('https://xatimg.com/image/TT2pRTbf2GZa.jpg') center/cover no-repeat;
">

<!-- overlay -->
<div style="
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
"></div>

<div style="position:relative;z-index:2;">
<h3>🧠 AI PANEL</h3>

<textarea id="input"></textarea>
<button onclick="ai()">ASK</button>
<div id="aiOut">Waiting...</div>
</div>

</div>

<!-- 2 STATUS -->
<div class="box">
<h3>📊 STATUS</h3>
<div id="status">Idle</div>
<button onclick="changeStatus()">Change Mode</button>
</div>

<!-- 3 TOOLS -->
<div class="box">
<h3>🛠 TOOLS</h3>
<button onclick="clearAll()">CLEAR</button>
<button onclick="hack()">HACK MODE</button>
<button onclick="boost()">BOOST</button>
</div>

<!-- 4 LOGS -->
<div class="box">
<h3>📜 LOGS</h3>
<div id="logs" class="small"></div>
</div>

<!-- 5 MUSIC -->
<div class="box">
<h3>🎧 MUSIC</h3>
<select id="songs">
<option>Song 1</option>
<option>Song 2</option>
<option>Song 3</option>
<option>Song 4</option>
<option>Song 5</option>
</select>
<button onclick="play()">PLAY</button>
<div id="musicOut"></div>
</div>

<!-- 6 CONTROL -->
<div class="box">
<h3>⚙️ CONTROL</h3>
<button onclick="shutdown()">SHUTDOWN</button>
<button onclick="restart()">RESTART</button>
<button onclick="god()">GOD MODE</button>
</div>

</div>

<script>

function log(t){
  document.getElementById("logs").innerHTML += "» "+t+"<br>";
}

/* AI */
function ai(){
  let t=document.getElementById("input").value;
  document.getElementById("aiOut").innerText="AI: "+t;
  log("AI request sent");
}

/* STATUS */
function changeStatus(){
  let s=document.getElementById("status");
  s.innerText = (s.innerText==="Idle") ? "Running..." : "Idle";
}

/* TOOLS */
function clearAll(){
  document.getElementById("input").value="";
  document.getElementById("aiOut").innerText="";
  log("System cleared");
}

function hack(){
  document.getElementById("status").innerText="HACK MODE ACTIVE";
  log("Hack mode enabled");
}

function boost(){
  log("System boosted");
}

/* MUSIC */
function play(){
  let s=document.getElementById("songs").value;
  document.getElementById("musicOut").innerText="Playing: "+s;
  log("Music started");
}

/* CONTROL */
function shutdown(){log("System shutdown");}
function restart(){log("System restart");}

function god(){
  document.body.style.boxShadow="0 0 60px #00ffcc";
  log("GOD MODE ACTIVATED");
}

</script>

</body>
</html>
