<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* TOP IMAGES */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.box{
  width:100%;
  aspect-ratio:4/3;
  border-radius:14px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.04);
}

/* ===================== */
/* BIG SECTION */
/* ===================== */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:600px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 20px rgba(0,255,204,0.2);
  display:flex;
  padding:15px;
  gap:15px;
}

/* LEFT CHAT LINKS */
.sidebar{
  width:18%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:10px;
}

.sidebar a{
  display:block;
  color:#00ffcc;
  text-decoration:none;
  margin:10px 0;
  font-size:13px;
  padding:5px;
  border-bottom:1px solid rgba(0,255,204,0.2);
}

.sidebar a:hover{
  background:rgba(0,255,204,0.1);
}

/* CENTER */
.center{
  flex:1;
  padding:10px;
}

/* PROFILE */
.profile{
  text-align:center;
  margin-bottom:15px;
}

.profile img{
  width:120px;
  height:120px;
  border-radius:50%;
  border:2px solid #00ffcc;
  box-shadow:0 0 15px #00ffcc;
}

.name{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
  color:#00ffcc;
  animation:pulse 1.5s infinite;
  text-shadow:0 0 10px #00ffcc;
}

@keyframes pulse{
  0%{opacity:1; text-shadow:0 0 5px #00ffcc;}
  50%{opacity:0.6; text-shadow:0 0 20px #00ffcc;}
  100%{opacity:1; text-shadow:0 0 5px #00ffcc;}
}

/* RADIOS */
.radios{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:10px;
}

audio{
  width:45%;
}

/* CONTROL BUTTON */
.control{
  display:flex;
  justify-content:center;
  margin-top:15px;
}

button{
  padding:15px 10px;
  border:none;
  background:#00ffcc;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
  writing-mode:vertical-rl;
  text-orientation:upright;
  box-shadow:0 0 10px #00ffcc;
}

button:hover{
  background:#00ffaa;
}

</style>
</head>

<body>

<!-- TOP IMAGES -->
<div class="container">

<div class="box" style="background-image:url('https://xatimg.com/image/Kn9aywnuvpVo.jpg');"></div>

<div class="box" style="background-image:url('https://xatimg.com/image/RKBN2koMEBaq.jpg');"></div>

<div class="box" style="background-image:url('https://xatimg.com/image/La8VreHLPDME.jpg');"></div>

</div>

<!-- BIG BOX -->
<div class="data-section">

<div class="big-box">

<!-- SIDEBAR -->
<div class="sidebar">
<a href="https://xat.com/2ra" target="_blank">2ra</a>
<a href="https://xat.com/7reqa" target="_blank">7reqa</a>
<a href="https://xat.com/trade" target="_blank">trade</a>
<a href="https://xat.com/cambio" target="_blank">cambio</a>
</div>

<!-- CENTER -->
<div class="center">

<!-- PROFILE -->
<div class="profile">
<img src="https://xatimg.com/image/mr0HaGwQtzx2.png">
<div class="name">RAMY</div>
</div>

<!-- RADIOS -->
<div class="radios">
<audio id="r1" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="r2" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>
</div>

<!-- CONTROL -->
<div class="control">
<button onclick="toggleRadio()">PLAY / STOP</button>
</div>

</div>

</div>

</div>

<script>

let playing = false;

function toggleRadio(){
  let r1 = document.getElementById("r1");
  let r2 = document.getElementById("r2");

  if(!playing){
    r1.play();
    r2.play();
    playing = true;
  }else{
    r1.pause();
    r2.pause();
    playing = false;
  }
}

</script>

</body>
</html>
