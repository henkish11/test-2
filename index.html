<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
margin:0;
background:#020b0f;
font-family:Tahoma;
color:#00ffcc;
}

/* TOP */
.top{
display:flex;
gap:10px;
padding:10px;
}

.top img{
width:33.3%;
border-radius:12px;
border:1px solid #00ffff55;
}

/* MAIN */
.main{
display:flex;
gap:10px;
padding:10px;
}

/* LEFT */
.left{
width:280px;
background:#03141a;
border:1px solid #00ffcc33;
border-radius:12px;
padding:15px;
}

.profile{
display:flex;
gap:10px;
align-items:center;
}

.profile img{
width:70px;
border-radius:50%;
border:2px solid #00ffcc;
}

.name{
font-size:26px;
color:#00ff88;
}

.section{
margin-top:15px;
color:#00ffaa;
}

/* RADIO */
.radio button{
width:48%;
padding:8px;
margin-top:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

.quran{background:#00aa55;}
.music{background:#6a00ff;color:#fff;}

/* CHAT */
.chat a{
display:block;
margin-top:8px;
padding:8px;
border:1px solid #00ffcc33;
border-radius:6px;
text-decoration:none;
color:#00ccff;
}

/* RIGHT */
.right{
flex:1;
background:#03141a;
border-radius:12px;
padding:10px;
}

.title{
text-align:center;
margin-bottom:10px;
}

/* SONGS */
.wrapSongs{
display:flex;
gap:10px;
}

.col{flex:1;}

.song{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #00ffcc22;
}

.song span{
color:#ffff66;
}

/* BUTTONS */
.play{background:#0088ff;color:#fff;border:none;}
.stop{background:#ff2222;color:#fff;border:none;}

/* PLAYER */
.player{
position:fixed;
bottom:0;
width:100%;
background:#021017;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid #00ffcc33;
}

.big{
width:60px;
height:60px;
border-radius:50%;
background:#00ffcc;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">
<img src="https://i.postimg.cc/Dzjxjdz6/a90024f2-cd48-4bf3-b09e-cea78dc21cab.png">
<img src="https://i.postimg.cc/Dzjxjdz6/a90024f2-cd48-4bf3-b09e-cea78dc21cab.png">
<img src="https://i.postimg.cc/Dzjxjdz6/a90024f2-cd48-4bf3-b09e-cea78dc21cab.png">
</div>

<div class="main">

<div class="left">
<div class="profile">
<img src="https://xatimg.com/image/mr0HaGwQtzx2.png">
<div class="name">RAMY</div>
</div>

<div class="section">RADIO</div>
<div class="radio">
<button class="quran" onclick="radio(0)">QURAN</button>
<button class="music" onclick="radio(1)">MUSIC</button>
</div>

<div class="section">CHAT</div>
<div class="chat">
<a href="#">2RA</a>
<a href="#">7REQA</a>
<a href="#">TRADE</a>
<a href="#">CAMBIO</a>
</div>
</div>

<div class="right">
<div class="title">SONGS by RAMY</div>

<div class="wrapSongs">

<div class="col">
<!-- 1-11 -->
<div class="song"><span>01. نفسي أطمن بيك</span><button onclick="playSong(0)">▶</button></div>
<div class="song"><span>02. الشعر الأسود</span><button onclick="playSong(1)">▶</button></div>
...
</div>

<div class="col">
<!-- 12-22 -->
<div class="song"><span>12. لسه</span><button onclick="playSong(11)">▶</button></div>
...
</div>

</div>
</div>

</div>

<div class="player">
<div>Now Playing</div>
<div class="big" onclick="audio.play()">▶</div>
</div>

<audio id="audio"></audio>

<script>
let audio=document.getElementById("audio");

const songs=[
"https://j.top4top.io/m_3769le8x51.mp3"
];

function playSong(i){
audio.src=songs[i];
audio.play();
}

let radios=[
new Audio("https://stream.radiojar.com/8s5u5tpdtwzuv"),
new Audio("https://audio.nrpstream.com/listen/nogoumfm/radio.mp3")
];

function radio(i){
radios[i].paused ? radios[i].play() : radios[i].pause();
}
</script>

</body>
</html>
