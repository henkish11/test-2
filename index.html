<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* TOP IMAGES */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.box{
  width:100%;
  aspect-ratio:4/3;
  border-radius:14px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.04);
}

/* BIG BOX */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:650px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 20px rgba(0,255,204,0.2);
  padding:20px;
  display:flex;
  gap:20px;
}

/* LEFT PROFILE SIDE */
.left-side{
  width:25%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:15px;
}

/* PROFILE */
.profile{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.profile img{
  width:70px;
  height:70px;
  border-radius:50%;
  border:2px solid #00ffcc;
  box-shadow:0 0 10px #00ffcc;
}

.name{
  font-size:26px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 15px #00ffcc;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.5;}
  100%{opacity:1;}
}

/* RADIOS */
.radio-box{
  margin-top:15px;
  padding:10px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
  background:rgba(0,255,204,0.05);
}

.radio-box h4{
  margin:0 0 5px 0;
  font-size:13px;
}

.radio-box button{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  background:#00ffcc;
  color:#000;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

/* RIGHT SIDE */
.right-side{
  flex:1;
  padding-left:10px;
}

/* LINKS */
.links{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:25px;
  flex-wrap:wrap;
}

.chat-btn{
  padding:10px 18px;
  border:1px solid rgba(0,255,204,0.4);
  border-radius:8px;
  text-decoration:none;
  color:#00ffcc;
  font-weight:bold;
  background:rgba(0,255,204,0.05);
  transition:0.3s;
}

.chat-btn:hover{
  background:#00ffcc;
  color:#000;
}

</style>
</head>

<body>

<!-- TOP IMAGES -->
<div class="container">

<div class="box" style="background-image:url('https://xatimg.com/image/Kn9aywnuvpVo.jpg');"></div>
<div class="box" style="background-image:url('https://xatimg.com/image/RKBN2koMEBaq.jpg');"></div>
<div class="box" style="background-image:url('https://xatimg.com/image/La8VreHLPDME.jpg');"></div>

</div>

<!-- BIG BOX -->
<div class="data-section">

<div class="big-box">

  <!-- LEFT SIDE -->
  <div class="left-side">

    <!-- PROFILE -->
    <div class="profile">
      <img src="https://xatimg.com/image/mr0HaGwQtzx2.png">
      <div class="name">RAMY</div>
    </div>

    <!-- RADIOS -->
    <div class="radio-box">
      <h4>📖 Quran Radio</h4>
      <button onclick="playRadio('quran')">PLAY / STOP</button>
    </div>

    <div class="radio-box">
      <h4>🎧 Music Radio</h4>
      <button onclick="playRadio('music')">PLAY / STOP</button>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="right-side">

    <!-- AUDIO -->
    <audio id="quran" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
    <audio id="music" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>

    <!-- LINKS -->
    <div class="links">
      <a class="chat-btn" href="https://xat.com/2ra" target="_blank">2RA</a>
      <a class="chat-btn" href="https://xat.com/7reqa" target="_blank">7REQA</a>
      <a class="chat-btn" href="https://xat.com/trade" target="_blank">TRADE</a>
      <a class="chat-btn" href="https://xat.com/cambio" target="_blank">CAMBIO</a>
    </div>

  </div>

</div>

</div>

<script>

function playRadio(id){

  let q = document.getElementById("quran");
  let m = document.getElementById("music");

  if(id === "quran"){
    m.pause(); m.currentTime = 0;
    if(q.paused) q.play();
    else q.pause();
  }

  if(id === "music"){
    q.pause(); q.currentTime = 0;
    if(m.paused) m.play();
    else m.pause();
  }

}

</script>

</body>
</html>
