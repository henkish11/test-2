<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* TOP BOXES (3 images - small height) */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:14px;
}

.box{
  width:100%;
  height:120px;
  border-radius:10px;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  border:1px solid rgba(0,255,204,0.18);
  box-shadow:0 0 12px rgba(0,255,204,0.15);
}

/* MAIN */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:900px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 25px rgba(0,255,204,0.2);
  padding:20px;
  display:flex;
  gap:20px;
}

/* LEFT PANEL */
.left-side{
  width:28%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:15px;
}

/* PROFILE */
.profile{
  display:flex;
  align-items:center;
  gap:15px;
}

.profile img{
  width:95px;
  height:95px;
  border-radius:50%;
  border:3px solid #00ffcc;
  box-shadow:0 0 20px #00ffcc;
}

.name{
  font-size:40px;
  font-weight:bold;
  text-shadow:0 0 25px #00ffcc;
}

/* RADIO */
.radio-box{
  margin-top:15px;
  padding:10px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
}

.radio-btn{
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* CHAT LINKS */
.chat-links a{
  display:block;
  text-decoration:none;
  color:#00ffcc;
  padding:8px;
  margin-top:6px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:6px;
  text-align:center;
}

/* RIGHT PANEL */
.right-side{
  flex:1;
  padding-left:15px;
}

/* SONGS BOX */
.songs-inner{
  width:100%;
  border-radius:14px;
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(0,255,204,0.15);
  padding:12px;
}

.songs-title{
  text-align:center;
  color:#66ccff;
  margin-bottom:10px;
}

.songs-grid{
  display:flex;
  gap:10px;
}

.songs-col{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* SONG ROW */
.song-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
  border-radius:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,0,0.12);
}

.song-name{
  color:#ffff66;
  font-size:12.5px;
  text-shadow:0 0 10px #ffff66;
}

/* BUTTONS */
.song-actions{
  display:flex;
  gap:6px;
}

.play{
  background:#00ccff;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 10px #00ccff;
}

.stop{
  background:#ff2b2b;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 10px #ff2b2b;
}

</style>
</head>

<body>

<!-- TOP 3 IMAGES -->
<div class="container">

<div class="box" style="background-image:url('https://i.imgur.com/9QKQZ3K.jpg');"></div>

<div class="box" style="background-image:url('https://i.imgur.com/3vQ7n8m.jpg');"></div>

<div class="box" style="background-image:url('https://i.imgur.com/7XkJp0A.jpg');"></div>

</div>

<!-- MAIN SYSTEM -->
<div class="data-section">

<div class="big-box">

<!-- LEFT SIDE -->
<div class="left-side">

    <img src="https://xatimg.com/image/mr0HaGwQtzx2.png">

  <!-- RADIOS -->
  <div class="radio-box">
    <h4>📖 Quran Radio</h4>
    <button class="radio-btn" onclick="toggleRadio('quran')">PLAY / STOP</button>
  </div>

  <div class="radio-box">
    <h4>🎧 Music Radio</h4>
    <button class="radio-btn" onclick="toggleRadio('music')">PLAY / STOP</button>
  </div>

  <!-- CHAT LINKS -->
  <div class="chat-links">
    <a href="https://xat.com/2ra" target="_blank">2RA</a>
    <a href="https://xat.com/7reqa" target="_blank">7REQA</a>
    <a href="https://xat.com/trade" target="_blank">TRADE</a>
    <a href="https://xat.com/cambio" target="_blank">CAMBIO</a>

</div>

<!-- RIGHT SIDE -->
<div class="right-side">

<div class="songs-grid">

<!-- COL 1 -->

<div class="song-row"><span class="song-name">كوابيس</span><div class="song-actions"><button class="play" onclick="playSong(3)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>

<div class="song-row"><span class="song-name">مشوار الحب</span><div class="song-actions"><button class="play" onclick="playSong(5)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">صاحبة الجلالة</span><div class="song-actions"><button class="play" onclick="playSong(6)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>

</div>

<!-- COL 2 -->
<div class="songs-col">

<div class="song-row"><span class="song-name">مش زي غيرها</span><div class="song-actions"><button class="play" onclick="playSong(12)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">نسند بعض</span><div class="song-actions"><button class="play" onclick="playSong(13)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">وش السعد</span><div class="song-actions"><button class="play" onclick="playSong(14)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">يا حظ بيه</span><div class="song-actions"><button class="play" onclick="playSong(15)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">ياللي ناسيني</span><div class="song-actions"><button class="play" onclick="playSong(16)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">هلوسة</span><div class="song-actions"><button class="play" onclick="playSong(17)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">قصة حب</span><div class="song-actions"><button class="play" onclick="playSong(18)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">ذكريات</span><div class="song-actions"><button class="play" onclick="playSong(19)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">حبيتك ليه</span><div class="song-actions"><button class="play" onclick="playSong(20)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>
<div class="song-row"><span class="song-name">توأمي</span><div class="song-actions"><button class="play" onclick="playSong(21)">▶</button><button class="stop" onclick="stopSong()">⏹</button></div></div>

</div>

</div>

</div>

</div>

</div>

<!-- AUDIO -->
<audio id="audio"></audio>
<audio id="quran" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="music" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>

<script>

const audio = document.getElementById("audio");
const quran = document.getElementById("quran");
const music = document.getElementById("music");

const songs = [
"https://j.top4top.io/m_3769le8x51.mp3",
"https://k.top4top.io/m_3769enq6z2.mp3",
"https://l.top4top.io/m_3769auk3d3.mp3",
"https://a.top4top.io/m_3769kdadn4.mp3",
"https://b.top4top.io/m_3769kg8sd5.mp3",
"https://c.top4top.io/m_3769ien0c6.mp3",
"https://d.top4top.io/m_3769yw3257.mp3",
"https://e.top4top.io/m_3769yb3k29.mp3",
"https://f.top4top.io/m_37690zriz10.mp3",
"https://b.top4top.io/m_3769lxi681.mp3",
"https://c.top4top.io/m_3769g0kg52.mp3",
"https://d.top4top.io/m_3769xz8mi3.mp3",
"https://e.top4top.io/m_3769o93s34.mp3",
"https://f.top4top.io/m_3769c3tql5.mp3",
"https://g.top4top.io/m_3769r7bcu6.mp3",
"https://l.top4top.io/m_3769p7dkd1.mp3",
"https://a.top4top.io/m_37697muuj2.mp3",
"https://b.top4top.io/m_3769i9yd13.mp3",
"https://c.top4top.io/m_3769ou0bt4.mp3",
"https://d.top4top.io/m_37697zirj5.mp3",
"https://e.top4top.io/m_3769rnmrk6.mp3",
"https://d.top4top.io/m_3769a1jgw1.mp3"
];

function playSong(i){
  audio.src = songs[i];
  audio.play();
}

function stopSong(){
  audio.pause();
  audio.currentTime = 0;
}

function toggleRadio(type){
  if(type==="quran"){
    music.pause();
    quran.paused ? quran.play() : quran.pause();
  }
  if(type==="music"){
    quran.pause();
    music.paused ? music.play() : music.pause();
  }
}

</script>

</body>
</html>
