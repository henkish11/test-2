<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY ASSASSIN VIP SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body,html{
margin:0;
padding:0;
font-family:Montserrat;
overflow-x:hidden;
background:black;
color:white;
}

/* 🔐 LOGIN SCREEN */
#loginScreen{
position:fixed;
width:100%;
height:100%;
background:url('https://xatimg.com/image/voMrCZnfZql3.jpg');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
overflow:hidden;
animation:loginMove 18s infinite alternate ease-in-out;
}

#loginScreen::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

@keyframes loginMove{
0%{transform:scale(1) translate(0,0);}
50%{transform:scale(1.08) translate(-10px,10px);}
100%{transform:scale(1.05) translate(10px,-10px);}
}

.loginBox{
position:relative;
z-index:2;
padding:30px;
background:rgba(0,0,0,0.8);
border:1px solid red;
box-shadow:0 0 40px red;
text-align:center;
backdrop-filter:blur(6px);
}

.loginBox input{
padding:10px;
background:black;
border:1px solid red;
color:red;
margin-top:10px;
}

.loginBox button{
padding:10px;
margin-top:10px;
background:black;
border:1px solid red;
color:red;
cursor:pointer;
}

/* 🌌 INSIDE BACKGROUND */
.background-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:url('https://xatimg.com/image/dx5xk8bPns9a.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
animation:insideMove 25s infinite alternate ease-in-out;
filter:brightness(0.75) contrast(1.2);
}

.background-container::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

@keyframes insideMove{
0%{
transform:scale(1) translate(0,0);
}
50%{
transform:scale(1.08) translate(-15px,10px);
}
100%{
transform:scale(1.05) translate(10px,-15px);
}
}

/* WRAPPER */
.wrapper{
position:relative;
z-index:10;
padding:20px;
}

/* NAV */
nav ul{
display:flex;
justify-content:center;
gap:15px;
list-style:none;
padding:10px;
background:rgba(0,0,0,0.6);
border:1px solid red;
}

nav ul li{
cursor:pointer;
color:#ccc;
transition:0.3s;
}

nav ul li:hover{
color:red;
}

/* CARDS */
.glass-card{
background:rgba(0,0,0,0.7);
border:1px solid rgba(255,0,60,0.5);
padding:20px;
margin:10px;
border-radius:15px;
box-shadow:0 0 25px rgba(255,0,60,0.3);
backdrop-filter:blur(5px);
}

/* PROFILE IMAGE */
.profile-img{
width:200px;
border-radius:20px;
border:2px solid red;
}

/* SECTIONS */
.page-section{
display:none;
}

.page-section.active{
display:block;
}

/* HERO */
.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:60px;
text-shadow:0 0 25px red;
}

/* AUDIO */
audio,iframe{
width:100%;
margin-top:10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
<div class="loginBox">
<h2>🔐 RAMY ACCESS</h2>
<input type="password" id="pass" placeholder="ENTER PASSWORD">
<br>
<button onclick="checkPass()">ENTER</button>
</div>
</div>

<!-- 🌌 BACKGROUND -->
<div class="background-container"></div>

<!-- CONTENT -->
<div class="wrapper">

<nav>
<ul>
<li onclick="show('home')">HOME</li>
<li onclick="show('profile')">PROFILE</li>
<li onclick="show('music')">MUSIC</li>
<li onclick="show('gallery')">GALLERY</li>
<li onclick="show('video')">VIDEO</li>
</ul>
</nav>

<!-- HOME -->
<div id="home" class="page-section active hero">
<h1>👑 RAMY ASSASSIN MODE</h1>
<p>AGE: 35 | STATUS: ONLINE 🟢</p>
<p>CYBER STEALTH WORLD ACTIVE 💀</p>
</div>

<!-- PROFILE -->
<div id="profile" class="page-section">
<div class="glass-card">
<h2>👤 RAMY PROFILE</h2>
<img class="profile-img" src="https://i.pinimg.com/736x/65/5a/7d/655a7d9d1945d77bb455b02c74d55aa8.jpg">
<p>NAME: RAMY</p>
<p>ID: 106080</p>
<p>AGE: 35</p>
<p>STATUS: ONLINE 🟢</p>
</div>
</div>

<!-- MUSIC -->
<div id="music" class="page-section">
<div class="glass-card">
<h2>🎧 MUSIC</h2>

<audio controls autoplay loop>
<source src="ojitos.mp3" type="audio/mpeg">
</audio>

<iframe src="https://www.youtube.com/embed/4ulSR860HyU"></iframe>
</div>
</div>

<!-- GALLERY -->
<div id="gallery" class="page-section">
<div class="glass-card">
<h2>🖼️ GALLERY</h2>
<img class="profile-img" src="https://xatimg.com/image/JyFHMCdyDiHE.jpg">
<img class="profile-img" src="https://xatimg.com/image/dx5xk8bPns9a.jpg">
</div>
</div>

<!-- VIDEO -->
<div id="video" class="page-section">
<div class="glass-card">
<h2>📽️ VIDEO</h2>
<iframe src="https://www.youtube.com/embed/QYyFc222o1s"></iframe>
</div>
</div>

</div>

<script>

/* 🔐 PASSWORD */
function checkPass(){
let p=document.getElementById("pass").value;
if(p==="111991"){
document.getElementById("loginScreen").style.display="none";
}else{
alert("❌ WRONG PASSWORD");
}
}

/* NAV */
function show(id){
document.querySelectorAll(".page-section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
