<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* TOP IMAGES */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.box{
  width:100%;
  aspect-ratio:4/3;
  border-radius:14px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.04);
}

/* BIG BOX */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:780px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 20px rgba(0,255,204,0.2);
  padding:20px;
  display:flex;
  gap:20px;
}

/* LEFT SIDE */
.left-side{
  width:28%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:15px;
}

/* PROFILE */
.profile{
  display:flex;
  align-items:center;
  gap:18px;
}

/* الصورة الشخصية */
.profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid #00ffcc;
  box-shadow:0 0 25px #00ffcc;
  transition:0.3s;
}

/* الاسم المجسم */
.name{
  font-size:34px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:
    0 0 5px #00ffcc,
    0 0 15px #00ffcc,
    0 0 25px #00ffcc,
    2px 2px 5px #000;
  animation:nameFloat 2.5s infinite;
  letter-spacing:2px;
}

/* حركة الاسم */
@keyframes nameFloat{
  0%{transform:translateY(0);}
  50%{transform:translateY(-3px);}
  100%{transform:translateY(0);}
}

/* RADIOS */
.radio-box{
  margin-top:15px;
  padding:10px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
  background:rgba(0,255,204,0.05);
}

.radio-box h4{
  margin:0 0 5px 0;
  font-size:13px;
}

.radio-box button{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  background:#00ffcc;
  color:#000;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

/* CHAT LINKS */
.chat-links{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.chat-links a{
  text-decoration:none;
  color:#00ffcc;
  padding:8px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:6px;
  font-size:13px;
  text-align:center;
  background:rgba(0,255,204,0.05);
  transition:0.3s;
}

.chat-links a:hover{
  background:#00ffcc;
  color:#000;
}

/* SONGS PANEL */
.songs-panel{
  margin-top:20px;
  padding:15px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:12px;
  background:rgba(0,255,204,0.05);
}

/* TITLE */
.songs-title{
  text-align:center;
  font-size:16px;
  color:#66ccff;
  font-weight:bold;
  text-shadow:0 0 12px #66ccff;
  animation:pulseBlue 2s infinite;
  margin-bottom:10px;
}

@keyframes pulseBlue{
  0%{opacity:1;}
  50%{opacity:0.5;}
  100%{opacity:1;}
}

.music-icon{
  margin-right:6px;
  animation:iconPulse 1.8s infinite;
  text-shadow:0 0 10px #66ccff;
}

@keyframes iconPulse{
  0%{opacity:1; transform:scale(1);}
  50%{opacity:0.4; transform:scale(1.2);}
  100%{opacity:1; transform:scale(1);}
}

/* GRID */
.songs-grid{
  display:flex;
  gap:10px;
}

.songs-col{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* SONG ITEM */
.song{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:6px;
  font-size:12px;
}

/* BUTTONS */
.btns{
  display:flex;
  gap:5px;
}

.play{
  background:#00ccff;
  border:none;
  padding:4px 8px;
  border-radius:4px;
  cursor:pointer;
  animation:pulseBtn 2s infinite;
}

.stop{
  background:red;
  border:none;
  padding:4px 8px;
  border-radius:4px;
  color:#fff;
  cursor:pointer;
  animation:pulseBtn 2s infinite;
}

@keyframes pulseBtn{
  0%{box-shadow:0 0 5px currentColor;}
  50%{box-shadow:0 0 15px currentColor;}
  100%{box-shadow:0 0 5px currentColor;}
}

</style>
</head>

<body>

<!-- TOP IMAGES -->
<div class="container">
<div class="box" style="background-image:url('https://xatimg.com/image/Kn9aywnuvpVo.jpg');"></div>
<div class="box" style="background-image:url('https://xatimg.com/image/RKBN2koMEBaq.jpg');"></div>
<div class="box" style="background-image:url('https://xatimg.com/image/La8VreHLPDME.jpg');"></div>
</div>

<!-- BIG SYSTEM -->
<div class="data-section">

<div class="big-box">

<!-- LEFT -->
<div class="left-side">

  <div class="profile">
    <img src="https://xatimg.com/image/mr0HaGwQtzx2.png">
    <div class="name">RAMY</div>
  </div>

  <div class="radio-box">
    <h4>📖 Quran Radio</h4>
    <button onclick="playRadio('quran')">PLAY / STOP</button>
  </div>

  <div class="radio-box">
    <h4>🎧 Music Radio</h4>
    <button onclick="playRadio('music')">PLAY / STOP</button>
  </div>

  <div class="chat-links">
    <a href="https://xat.com/2ra" target="_blank">2RA</a>
    <a href="https://xat.com/7reqa" target="_blank">7REQA</a>
    <a href="https://xat.com/trade" target="_blank">TRADE</a>
    <a href="https://xat.com/cambio" target="_blank">CAMBIO</a>
  </div>

</div>

<!-- RIGHT -->
<div class="right-side">

<div class="songs-panel">

<div class="songs-title">
  <span class="music-icon">🎵</span>
  songs
</div>

<!-- باقي نفس الأغاني (محفوظة كما هي) -->

<div class="songs-grid">
<div class="songs-col"></div>
<div class="songs-col"></div>
</div>

</div>

</div>

</div>

</div>

<script>

let audio = new Audio();
let current = -1;

const songs = [
"j.top4top.io/m_3769le8x51.mp3",
"k.top4top.io/m_3769enq6z2.mp3",
"l.top4top.io/m_3769auk3d3.mp3",
"a.top4top.io/m_3769kdadn4.mp3",
"b.top4top.io/m_3769kg8sd5.mp3",
"c.top4top.io/m_3769ien0c6.mp3",
"d.top4top.io/m_3769yw3257.mp3",
"e.top4top.io/m_3769yb3k29.mp3",
"f.top4top.io/m_37690zriz10.mp3",
"b.top4top.io/m_3769lxi681.mp3",
"c.top4top.io/m_3769g0kg52.mp3",
"d.top4top.io/m_3769xz8mi3.mp3",
"e.top4top.io/m_3769o93s34.mp3",
"f.top4top.io/m_3769c3tql5.mp3",
"g.top4top.io/m_3769r7bcu6.mp3",
"l.top4top.io/m_3769p7dkd1.mp3",
"a.top4top.io/m_37697muuj2.mp3",
"b.top4top.io/m_3769i9yd13.mp3",
"c.top4top.io/m_3769ou0bt4.mp3",
"d.top4top.io/m_37697zirj5.mp3",
"e.top4top.io/m_3769rnmrk6.mp3",
"d.top4top.io/m_3769a1jgw1.mp3"
];

function playSong(i){
  if(current !== -1) audio.pause();
  audio.src = "https://" + songs[i];
  audio.play();
  current = i;
}

function stopSong(i){
  if(current === i){
    audio.pause();
    audio.currentTime = 0;
    current = -1;
  }
}

function playRadio(id){
  let q = document.getElementById("quran");
  let m = document.getElementById("music");

  if(id === "quran"){
    m.pause();
    q.paused ? q.play() : q.pause();
  }

  if(id === "music"){
    q.pause();
    m.paused ? m.play() : m.pause();
  }
}

</script>

<audio id="quran" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="music" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>

</body>
</html>
