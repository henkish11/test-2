<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* ✨ NEON TEXT */
*{
  transition:0.25s ease;
}

.neon{
  text-shadow:0 0 5px #00ffcc,0 0 10px #00ffcc,0 0 20px #00ffcc;
}

/* HOVER ZOOM */
.box,.song-row,.chat-links a,.radio-box,.media-btn{
  transition:0.25s;
}

.box:hover,
.song-row:hover,
.chat-links a:hover,
.radio-box:hover,
.media-btn:hover{
  transform:scale(1.05);
}

/* TOP BOXES */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:14px;
}

.box{
  height:120px;
  border-radius:10px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
}

/* MAIN */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:950px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 25px rgba(0,255,204,0.2);
  padding:20px;
  display:flex;
  flex-direction:column;
}

.content{
  display:flex;
  gap:20px;
}

/* LEFT */
.left-side{
  width:28%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:15px;
}

.profile{
  display:flex;
  align-items:center;
  gap:15px;
}

.profile img{
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid #00ffcc;
  box-shadow:0 0 20px #00ffcc;
}

.name{
  font-size:42px;
}

/* RADIO */
.radio-box{
  margin-top:10px;
  padding:10px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
}

.radio-btn{
  width:100%;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#00ccff;
  color:#fff;
  box-shadow:0 0 10px #00ccff;
}

/* CHAT */
.chat-links a{
  display:block;
  text-decoration:none;
  color:#00ffcc;
  padding:8px;
  margin-top:6px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:6px;
  text-align:center;
}

/* RIGHT */
.right-side{
  flex:1;
  padding-left:15px;
}

.songs-inner{
  border-radius:14px;
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(0,255,204,0.15);
  padding:12px;
}

.songs-title{
  text-align:center;
  font-size:18px;
  color:#66ccff;
  text-shadow:0 0 10px #66ccff;
}

.songs-grid{
  display:flex;
  gap:10px;
}

.songs-col{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* SONG */
.song-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
  border-radius:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,0,0.12);
}

.song-name{
  color:#ffff66;
  text-shadow:0 0 10px #ffff66;
}

.song-actions button{
  cursor:pointer;
  border:none;
  padding:5px 10px;
  border-radius:8px;
}

.play{
  background:#00ccff;
  box-shadow:0 0 10px #00ccff;
}

.stop{
  background:#ff2b2b;
  box-shadow:0 0 10px #ff2b2b;
}

/* MEDIA */
.media-bar{
  margin-top:25px;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  border-radius:16px;
  background:rgba(0,255,204,0.05);
  border:1px solid rgba(0,255,204,0.3);
}

#seek{
  width:40%;
}

.media-btn{
  background:#00ccff;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
}

#volume{
  width:25%;
}
</style>
</head>

<body>

<div class="data-section">
<div class="big-box">

<div class="content">

<!-- LEFT -->
<div class="left-side">

<div class="profile">
<img src="https://xatimg.com/image/mr0HaGwQtzx2.png">
<div class="name neon">RAMY</div>
</div>

<!-- RADIO -->
<div class="radio-box neon">

<!-- CHAT -->
<div class="chat-links neon">
<a href="https://xat.com/2ra" target="_blank">2RA</a>
<a href="https://xat.com/7reqa" target="_blank">7REQA</a>
<a href="https://xat.com/trade" target="_blank">TRADE</a>

</div>

<!-- RIGHT -->
<div class="right-side">

<div class="songs-inner">

<button class="play" onclick="playSong(1)">▶</button>

</div>

<div class="song-row neon"><span>حبي الأولاني</span></div>
<div class="song-row neon"><span>كوابيس</span></div>
<div class="song-row neon"><span>مش تمام</span></div>
<div class="song-row neon"><span>مشوار الحب</span></div>
<div class="song-row neon"><span>صاحبة الجلالة</span></div>
<div class="song-row neon"><span>عملالي عمل</span></div>
<div class="song-row neon"><span>بحبها</span></div>
<div class="song-row neon"><span>فيكي سر</span></div>
<div class="song-row neon"><span>حياتي قصيدة</span></div>

</div>

<!-- RIGHT -->
<div class="songs-col">

<div class="song-row neon"><span>لسه</span></div>
<div class="song-row neon"><span>مش زي غيرها</span></div>
<div class="song-row neon"><span>نسند بعض</span></div>
<div class="song-row neon"><span>وش السعد</span></div>
<div class="song-row neon"><span>يا حظ بيه</span></div>
<div class="song-row neon"><span>ياللي ناسيني</span></div>
<div class="song-row neon"><span>هلوسة</span></div>
<div class="song-row neon"><span>قصة حب</span></div>
<div class="song-row neon"><span>ذكريات</span></div>
<div class="song-row neon"><span>حبيتك ليه</span></div>
<div class="song-row neon"><span>توأمي</span></div>

</div>

</div>

</div>

<!-- MEDIA -->
<div class="media-bar neon">

<input type="range" id="seek">
<button class="media-btn" onclick="togglePlay()">▶ / ⏸</button>
<input type="range" id="volume" min="0" max="1" step="0.1">

</div>

</div>
</div>
</div>

<!-- AUDIO -->
<audio id="audio"></audio>

<audio id="radio1" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="radio2" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>

<script>

const audio=document.getElementById("audio");
const r1=document.getElementById("radio1");
const r2=document.getElementById("radio2");

let radios=[r1,r2];

function toggleRadio(i){
radios[i].paused?radios[i].play():radios[i].pause();

const songs=[
"https://j.top4top.io/m_3769le8x51.mp3",
"https://k.top4top.io/m_3769enq6z2.mp3",

"https://f.top4top.io/m_3769c3tql5.mp3",
"https://g.top4top.io/m_3769r7bcu6.mp3",
"https://l.top4top.io/m_3769p7dkd1.mp3",
"https://a.top4top.io/m_37697muuj2.mp3",

"https://c.top4top.io/m_3769ou0bt4.mp3",
"https://d.top4top.io/m_37697zirj5.mp3",
"https://e.top4top.io/m_3769rnmrk6.mp3",
"https://d.top4top.io/m_3769a1jgw1.mp3"
];

function playSong(i){
audio.src=songs[i];
audio.play();
}

function stopSong(){
audio.pause();
audio.currentTime=0;
}

function togglePlay(){
audio.paused?audio.play():audio.pause();
}

</script>

</body>
</html>
