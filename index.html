
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>✌︎ ᖇaму</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#6366f1;
  --accent-soft:rgba(99,102,241,.15);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#1e293b,var(--bg));
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow-x:hidden;
  overflow-y:auto;
}

/* ❄️ Snow */
.snow{
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(2px 2px at 20px 30px,#fff,transparent),
    radial-gradient(2px 2px at 80px 90px,#fff,transparent),
    radial-gradient(3px 3px at 150px 50px,#fff,transparent),
    radial-gradient(2px 2px at 200px 120px,#fff,transparent),
    radial-gradient(3px 3px at 260px 200px,#fff,transparent);
  background-size:300px 300px;
  animation:snowFall 14s linear infinite;
  z-index:1;
  opacity:.8;
}
@keyframes snowFall{
  from{background-position:0 0}
  to{background-position:0 300px}
}

.profile{
  max-width:420px;
  width:100%;
  background:linear-gradient(180deg,#111827,#0b1220);
  border-radius:20px;
  padding:30px 25px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  position:relative;
  z-index:3;
}

.avatar{
  width:110px;height:110px;
  margin:0 auto 15px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#22d3ee);
  padding:4px;
}
.avatar img{
  width:100%;height:100%;
  border-radius:50%;
  object-fit:cover;
}

h1{text-align:center;font-size:26px}
.tagline{text-align:center;font-size:14px;color:var(--muted);margin-top:6px}

.divider{
  height:1px;
  background:linear-gradient(to right,transparent,var(--accent),transparent);
  margin:20px 0;
}

.info{display:grid;gap:12px;font-size:14px}
.info span{color:var(--muted)}

.skills{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:8px;
  justify-content:center;
}
.skill{
  background:var(--accent-soft);
  color:#c7d2fe;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
}

.clock{
  margin-top:18px;
  text-align:center;
  font-size:22px;
  font-weight:600;
  letter-spacing:2px;
  color:#c7d2fe;
  text-shadow:0 0 12px rgba(199,210,254,.35);
}

.actions{
  display:grid;
  gap:12px;
  margin-top:25px;
}

.btn{
  text-decoration:none;
  text-align:center;
  padding:12px;
  border-radius:12px;
  font-weight:600;
  font-size:14px;
}

.btn-primary{
  background:linear-gradient(135deg,var(--accent),#22d3ee);
  color:#020617;
}
.btn-outline{
  border:1px solid var(--accent);
  color:var(--text);
}

.snowman-container {
  position:absolute;
  top:60px;     
  right:-70px;   
  width:90px;
  z-index:2;
}

.snowman-png {
  width:100%;
  display:block;
  animation:waveHand 2.5s ease-in-out infinite;
}

.snowman-text {
  position:absolute;
  bottom:100%;       
  left:50%;         
  transform:translateX(-50%);
  font-size:12px;
  color:#c7d2fe;
  font-weight:600;
  text-shadow:0 0 5px rgba(0,0,0,.4);
  opacity:0;
  animation:hiText 2.5s ease-in-out infinite;
}

@keyframes waveHand{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}

@keyframes hiText {
  0%,40% {opacity:0; transform:translateX(-50%) translateY(6px);}
  60%,80% {opacity:1; transform:translateX(-50%) translateY(0);}
  100% {opacity:0;}
}
</style>
</head>

<body>

<div class="snow"></div>

<div class="profile">

  <div class="avatar">
    <img src="https://xatimg.com/image/IWcVsq6SDKuh.jpg">
  </div>

  <h1>✌︎ ᖇaму</h1>
  <div class="tagline">Trade days and powers</div>

  <div class="divider"></div>

  <div class="info">
    <div><span>Regname :</span> iEgypt </div>
    <div><span>ID :</span> 106080</div>
    <div><span>support chat :</span> Trade , cambio , 7reqa</div>
  </div>

  <div class="skills">
    <div class="skill">Helping</div>
    <div class="skill">Trading</div>
  </div>

  <div class="clock" id="clock">00:00:00</div>

  <div class="actions">
    <a href="https://xat.com/7reqa"> Stay here online</a>
    <a href="https://xat.com/2ra"> my chat </a>
  </div>

  <div class="snowman-container">
    <img src="https://xatimg.com/image/AbEkJguyds2Y.png" class="snowman-png" alt="Snowman">
    <span class="snowman-text">Always the strongest</span>
  </div>

</div>

<script>
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent=`${h}:${m}:${s}`;
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
