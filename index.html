<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM v3.0</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
color:#00ffcc;
overflow:hidden;
}

/* MATRIX */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* TOP */
.top{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{
height:160px;
border-radius:12px;
background-size:cover;
border:1px solid #00ffff55;
box-shadow:0 0 20px #00ffff55;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #00ffff55;}
to{box-shadow:0 0 25px #00ffff;}
}

/* HACK TEXT */
.hack{
position:absolute;
top:10px;
right:20px;
color:#ff00ff;
font-weight:bold;
}

/* MAIN */
.main{
display:flex;
gap:10px;
padding:10px;
}

/* LEFT */
.left{
width:280px;
background:#03141a;
border:1px solid #00ffcc33;
border-radius:12px;
padding:15px;
}

.profile{
display:flex;
gap:10px;
align-items:center;
}

.profile img{
width:70px;
border-radius:50%;
border:2px solid #00ffcc;
}

.name{
font-size:26px;
color:#00ff88;
}

/* RIGHT */
.right{
flex:1;
background:#03141a;
border-radius:12px;
padding:10px;
}

/* SONGS */
.songs-wrap{
display:flex;
gap:10px;
}

.col{flex:1;}

.song{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #00ffcc22;
}

.song span{color:#ffff66;}

.play{background:#0088ff;color:#fff;border:none;}
.stop{background:#ff2222;color:#fff;border:none;}

/* PLAYER */
.player{
position:fixed;
bottom:0;
width:100%;
background:#021017;
display:flex;
justify-content:center;
padding:10px;
}

.bigplay{
width:70px;
height:70px;
border-radius:50%;
background:#00ffcc;
display:flex;
justify-content:center;
align-items:center;
font-size:25px;
cursor:pointer;
box-shadow:0 0 20px #00ffcc;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="hack">HACKING... <span id="percent">0%</span></div>

<div class="top">
<div class="card" style="background-image:url('https://media.giphy.com/media/13HgwGsXF0aiGY/giphy.gif')"></div>
<div class="card" style="background-image:url('https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif')"></div>
<div class="card" style="background-image:url('https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif')"></div>
</div>

<div class="main">

<div class="left">
<div class="profile">
<img src="https://xatimg.com/image/mr0HaGwQtzx2.png">
<div class="name">RAMY</div>
</div>
</div>

<div class="right">

<div class="songs-wrap">

<div class="col">
<div class="song"><span>01. نفسي أطمن بيك</span><div><button class="play" onclick="playSong(0)">▶</button><button class="stop" onclick="stop()">■</button></div></div>
<div class="song"><span>02. الشعر الأسود</span><div><button class="play" onclick="playSong(1)">▶</button><button class="stop" onclick="stop()">■</button></div></div>
</div>

<div class="col">
<div class="song"><span>12. لسه</span><div><button class="play" onclick="playSong(11)">▶</button><button class="stop" onclick="stop()">■</button></div></div>
</div>

</div>

</div>

</div>

<div class="player">
<div class="bigplay" onclick="audio.play()">▶</div>
</div>

<audio id="audio"></audio>

<script>
let audio=document.getElementById("audio");

/* HACK % */
let p=0;
setInterval(()=>{
p=(p+1)%100;
document.getElementById("percent").innerText=p+"%";
},80);

/* MATRIX */
let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");
canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01";
letters=letters.split("");

let fontSize=14;
let columns=canvas.width/fontSize;
let drops=[];
for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}
setInterval(draw,33);

/* SONGS */
const songs=[
"https://j.top4top.io/m_3769le8x51.mp3"
];

function playSong(i){
audio.src=songs[i];
audio.play();
}

function stop(){
audio.pause();
audio.currentTime=0;
}
</script>

</body>
</html>
