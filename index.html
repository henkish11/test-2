<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAMY VIP PROFILE</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary-red:#ff003c;
--dark-red:#8a0020;
--text-light:#fff;
}

body,html{
margin:0;
padding:0;
font-family:Montserrat;
background:black;
overflow-x:hidden;
}

/* 🔐 LOGIN */
#loginScreen{
position:fixed;
width:100%;
height:100%;
background:url('https://xatimg.com/image/AeKGBMT8u33T.jpg');
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.loginBox{
padding:30px;
background:rgba(0,0,0,0.8);
border:1px solid red;
box-shadow:0 0 40px red;
text-align:center;
color:white;
}

.loginBox input{
padding:10px;
background:black;
border:1px solid red;
color:red;
margin-top:10px;
}

.loginBox button{
padding:10px;
margin-top:10px;
background:black;
border:1px solid red;
color:red;
cursor:pointer;
}

/* 🌌 BACKGROUND */
.background-container{
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:url('https://xatimg.com/image/Y9hKhcjKPyUk.jpg');
background-size:cover;
background-position:center;
}

/* WRAPPER */
.wrapper{
position:relative;
z-index:10;
padding:20px;
color:white;
}

/* NAV */
nav ul{
display:flex;
gap:15px;
list-style:none;
justify-content:center;
padding:10px;
border:1px solid red;
background:rgba(0,0,0,0.6);
}

nav ul li{
cursor:pointer;
color:#ccc;
}

/* ACTIVE */
nav ul li:hover{
color:red;
}

/* CARDS */
.glass-card{
background:rgba(0,0,0,0.7);
border:1px solid rgba(255,0,60,0.4);
padding:20px;
margin:10px;
box-shadow:0 0 20px rgba(255,0,60,0.3);
border-radius:15px;
}

/* PROFILE IMAGE */
.profile-img{
width:200px;
border-radius:20px;
border:2px solid red;
}

/* SECTIONS */
.page-section{
display:none;
}

.page-section.active{
display:block;
}

iframe{
width:100%;
height:200px;
border:none;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
<div class="loginBox">
<h2>🔐 RAMY ACCESS</h2>
<input type="password" id="pass" placeholder="PASSWORD">
<br>
<button onclick="checkPass()">ENTER</button>
</div>
</div>

<!-- 🌌 BACKGROUND -->
<div class="background-container"></div>

<!-- WRAPPER -->
<div class="wrapper">

<nav>
<ul>
<li onclick="show('home')">HOME</li>
<li onclick="show('profile')">PROFILE</li>
<li onclick="show('music')">MUSIC</li>
<li onclick="show('gallery')">GALLERY</li>
<li onclick="show('video')">VIDEO</li>
</ul>
</nav>

<!-- HOME -->
<div id="home" class="page-section active">
<div class="glass-card">
<h1>👑 RAMY VIP SYSTEM</h1>
<p>AGE: 35 | STATUS: ONLINE 🟢</p>
<p>CYBER ASSASSIN MODE ACTIVATED 💀</p>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="page-section">
<div class="glass-card">
<h2>👤 PROFILE</h2>
<img class="profile-img" src="https://i.pinimg.com/736x/65/5a/7d/655a7d9d1945d77bb455b02c74d55aa8.jpg">
<p>NAME: RAMY</p>
<p>ID: 106080</p>
<p>AGE: 35</p>
<p>STATUS: ONLINE 🟢</p>
</div>
</div>

<!-- MUSIC -->
<div id="music" class="page-section">
<div class="glass-card">
<h2>🎧 MUSIC MP3</h2>

<audio controls autoplay loop>
<source src="ojitos.mp3" type="audio/mpeg">
</audio>

<h3>🎬 YOUTUBE</h3>
<iframe src="https://www.youtube.com/embed/4ulSR860HyU"></iframe>
</div>
</div>

<!-- GALLERY -->
<div id="gallery" class="page-section">
<div class="glass-card">
<h2>🖼️ GALLERY</h2>
<img class="profile-img" src="https://xatimg.com/image/JyFHMCdyDiHE.jpg">
<img class="profile-img" src="https://xatimg.com/image/Y9hKhcjKPyUk.jpg">
</div>
</div>

<!-- VIDEO -->
<div id="video" class="page-section">
<div class="glass-card">
<h2>📽️ VIDEO</h2>
<iframe src="https://www.youtube.com/embed/QYyFc222o1s"></iframe>
</div>
</div>

</div>

<script>

/* 🔐 PASSWORD */
function checkPass(){
let p=document.getElementById("pass").value;
if(p==="111991"){
document.getElementById("loginScreen").style.display="none";
}else{
alert("❌ WRONG PASSWORD");
}
}

/* NAV */
function show(id){
document.querySelectorAll(".page-section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
