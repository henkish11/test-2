<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* TOP IMAGES */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.box{
  width:100%;
  aspect-ratio:4/3;
  border-radius:14px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.04);
}

/* BIG BOX */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:650px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 20px rgba(0,255,204,0.2);
  padding:20px;
  display:flex;
  gap:20px;
}

/* LEFT SIDE */
.left-side{
  width:28%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:15px;
}

/* PROFILE */
.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.profile img{
  width:70px;
  height:70px;
  border-radius:50%;
  border:2px solid #00ffcc;
  box-shadow:0 0 10px #00ffcc;
}

.name{
  font-size:26px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 15px #00ffcc;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.5;}
  100%{opacity:1;}
}

/* RADIOS */
.radio-box{
  margin-top:15px;
  padding:10px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
  background:rgba(0,255,204,0.05);
}

.radio-box h4{
  margin:0 0 5px 0;
  font-size:13px;
}

.radio-box button{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  background:#00ffcc;
  color:#000;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

/* CHAT LINKS (LEFT SIDE BOTTOM) */
.chat-links{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.chat-links a{
  text-decoration:none;
  color:#00ffcc;
  padding:8px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:6px;
  font-size:13px;
  text-align:center;
  background:rgba(0,255,204,0.05);
  transition:0.3s;
}

.chat-links a:hover{
  background:#00ffcc;
  color:#000;
}

/* RIGHT SIDE */
.right-side{
  flex:1;
}

/* LINKS (removed center usage - kept empty space for future) */

</style>
</head>

<body>

<!-- TOP IMAGES -->
<div class="container">

<div class="box" style="background-image:url('https://xatimg.com/image/Kn9aywnuvpVo.jpg');"></div>
<div class="box" style="background-image:url('https://xatimg.com/image/RKBN2koMEBaq.jpg');"></div>
<div class="box" style="background-image:url('https://xatimg.com/image/La8VreHLPDME.jpg');"></div>

</div>

<!-- BIG SYSTEM -->
<div class="data-section">

<div class="big-box">

  <!-- LEFT SIDE -->
  <div class="left-side">

    <div class="profile">
      <img src="https://xatimg.com/image/mr0HaGwQtzx2.png">
      <div class="name">RAMY</div>
    </div>

    <!-- RADIOS -->
    <div class="radio-box">
      <h4>📖 Quran Radio</h4>
      <button onclick="playRadio('quran')">PLAY / STOP</button>
    </div>

    <div class="radio-box">
      <h4>🎧 Music Radio</h4>
      <button onclick="playRadio('music')">PLAY / STOP</button>
    </div>

    <!-- CHAT LINKS (LEFT SIDE) -->
    <div class="chat-links">
      <a href="https://xat.com/2ra" target="_blank">2RA</a>
      <a href="https://xat.com/7reqa" target="_blank">7REQA</a>
      <a href="https://xat.com/trade" target="_blank">TRADE</a>
      <a href="https://xat.com/cambio" target="_blank">CAMBIO</a>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="right-side">

    <audio id="quran" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
    <audio id="music" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>

  </div>

</div>

</div>

<script>

function playRadio(id){

  let q = document.getElementById("quran");
  let m = document.getElementById("music");

  if(id === "quran"){
    m.pause(); m.currentTime = 0;
    q.paused ? q.play() : q.pause();
  }

  if(id === "music"){
    q.pause(); q.currentTime = 0;
    m.paused ? m.play() : m.pause();
  }

}

</script>

</body>
</html>
