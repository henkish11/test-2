<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

/* BOXES */
.box{
  border:1px solid #00ffcc;
  border-radius:12px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 15px rgba(0,255,204,0.15);
  height:220px;
  overflow:auto;
}

/* MUSIC PANEL */
.music{
  padding:10px;
}

.song{
  display:flex;
  justify-content:space-between;
  padding:5px;
  border-bottom:1px solid rgba(0,255,204,0.2);
  cursor:pointer;
  font-size:13px;
}

.song:hover{
  background:rgba(0,255,204,0.1);
}

/* PLAYER */
audio{
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- MUSIC BOX -->
<div class="box music">

<h3>🎧 MUSIC PLAYER</h3>

<div id="list"></div>

<audio id="player" controls></audio>

</div>

<!-- empty panels (زي الداشبورد) -->
<div class="box"></div>
<div class="box"></div>

<div class="box"></div>
<div class="box"></div>
<div class="box"></div>

</div>

<script>

const songs = [
["نفسي أطمن بيك","https://j.top4top.io/m_3769le8x51.mp3"],
["الشعر الأسود","https://k.top4top.io/m_3769enq6z2.mp3"],
["حبي الأولاني","https://l.top4top.io/m_3769auk3d3.mp3"],
["كوابيس","https://a.top4top.io/m_3769kdadn4.mp3"],
["مش تمام","https://b.top4top.io/m_3769kg8sd5.mp3"],
["مشوار الحب","https://c.top4top.io/m_3769ien0c6.mp3"],
["صاحبة الجلالة","https://d.top4top.io/m_3769yw3257.mp3"],
["عملالي عمل","https://e.top4top.io/m_3769yb3k29.mp3"],
["بحبها","https://f.top4top.io/m_37690zriz10.mp3"],
["فيكي سر","https://b.top4top.io/m_3769lxi681.mp3"],
["حياتي قصيدة","https://c.top4top.io/m_3769g0kg52.mp3"],
["لسه","https://d.top4top.io/m_3769xz8mi3.mp3"],
["مش زي غيرها","https://e.top4top.io/m_3769o93s34.mp3"],
["نسند بعض","https://f.top4top.io/m_3769c3tql5.mp3"],
["وش السعد","https://g.top4top.io/m_3769r7bcu6.mp3"],
["يا حظ بيه","https://l.top4top.io/m_3769p7dkd1.mp3"],
["ياللي ناسيني","https://a.top4top.io/m_37697muuj2.mp3"],
["هلوسة","https://b.top4top.io/m_3769i9yd13.mp3"],
["قصة حب","https://c.top4top.io/m_3769ou0bt4.mp3"],
["ذكريات","https://d.top4top.io/m_37697zirj5.mp3"],
["حبيتك ليه","https://e.top4top.io/m_3769rnmrk6.mp3"],
["توأمي","https://d.top4top.io/m_3769a1jgw1.mp3"]
];

const list = document.getElementById("list");
const player = document.getElementById("player");

songs.forEach(s => {
  let div = document.createElement("div");
  div.className = "song";
  div.innerHTML = "🎵 " + s[0];

  div.onclick = () => {
    player.src = s[1];
    player.play();
  };

  list.appendChild(div);
});

</script>

</body>
</html>
