<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* ================= TOP IMAGES ================= */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.box{
  width:100%;
  aspect-ratio:4/3;
  border-radius:14px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.04);
}

/* ================= BIG BOX ================= */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:900px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 25px rgba(0,255,204,0.2);
  padding:20px;
  display:flex;
  gap:20px;
}

/* ================= LEFT SIDE ================= */
.left-side{
  width:28%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:15px;
}

/* PROFILE */
.profile{
  display:flex;
  align-items:center;
  gap:18px;
}

.profile img{
  width:95px;
  height:95px;
  border-radius:50%;
  border:3px solid #00ffcc;
  box-shadow:0 0 25px #00ffcc;
}

.name{
  font-size:38px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:
    0 0 5px #00ffcc,
    0 0 15px #00ffcc,
    0 0 25px #00ffcc;
  animation:nameFloat 2.5s infinite;
  letter-spacing:2px;
}

@keyframes nameFloat{
  0%{transform:translateY(0);}
  50%{transform:translateY(-3px);}
  100%{transform:translateY(0);}
}

/* RADIOS */
.radio-box{
  margin-top:15px;
  padding:10px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
  background:rgba(0,255,204,0.05);
}

.radio-box button{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  background:#00ffcc;
  color:#000;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

/* CHAT LINKS */
.chat-links{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.chat-links a{
  text-decoration:none;
  color:#00ffcc;
  padding:8px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:6px;
  font-size:13px;
  text-align:center;
  background:rgba(0,255,204,0.05);
  transition:0.3s;
}

.chat-links a:hover{
  background:#00ffcc;
  color:#000;
}

/* ================= SONGS ================= */
.songs-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* ROW */
.song-row{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:10px 12px;
  border-radius:10px;

  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,0,0.15);

  box-shadow:0 0 10px rgba(255,255,0,0.08);
  transition:0.3s;
}

.song-row:hover{
  transform:scale(1.01);
  box-shadow:0 0 18px rgba(255,255,0,0.25);
}

/* NAME */
.song-name{
  color:#ffff66;
  font-size:13px;
  font-weight:bold;
  text-shadow:0 0 10px #ffff66;
  animation:yellowPulse 1.8s infinite;
}

@keyframes yellowPulse{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

/* BUTTONS */
.song-actions{
  display:flex;
  gap:8px;
}

.play{
  background:#00ccff;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  color:#000;
  font-weight:bold;
  box-shadow:0 0 12px #00ccff;
  animation:btnGlow 1.5s infinite;
}

.stop{
  background:#ff2b2b;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  color:#fff;
  font-weight:bold;
  box-shadow:0 0 12px #ff2b2b;
  animation:btnGlow 1.5s infinite;
}

@keyframes btnGlow{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.6);}
  100%{filter:brightness(1);}
}

</style>
</head>

<body>

<div class="song-row"><span class="song-name">عملالي عمل</span></div>
<div class="song-row"><span class="song-name">بحبها</span></div>
<div class="song-row"><span class="song-name">فيكي سر</span></div>
<div class="song-row"><span class="song-name">حياتي قصيدة</span></div>

<div class="song-row"><span class="song-name">لسه</span></div>
<div class="song-row"><span class="song-name">مش زي غيرها</span></div>
<div class="song-row"><span class="song-name">نسند بعض</span></div>

</div>

<script>

let audio = new Audio();
let current = -1;

const songs = [
"j.top4top.io/m_3769le8x51.mp3",
"k.top4top.io/m_3769enq6z2.mp3",
"l.top4top.io/m_3769auk3d3.mp3",
"a.top4top.io/m_3769kdadn4.mp3",
"b.top4top.io/m_3769kg8sd5.mp3",
"c.top4top.io/m_3769ien0c6.mp3",
"d.top4top.io/m_3769yw3257.mp3",
"e.top4top.io/m_3769yb3k29.mp3",
"f.top4top.io/m_37690zriz10.mp3",
"b.top4top.io/m_3769lxi681.mp3",
"c.top4top.io/m_3769g0kg52.mp3",
"d.top4top.io/m_3769xz8mi3.mp3",
"e.top4top.io/m_3769o93s34.mp3",
"f.top4top.io/m_3769c3tql5.mp3",
"g.top4top.io/m_3769r7bcu6.mp3",
"l.top4top.io/m_3769p7dkd1.mp3",
"a.top4top.io/m_37697muuj2.mp3",
"b.top4top.io/m_3769i9yd13.mp3",
"c.top4top.io/m_3769ou0bt4.mp3",
"d.top4top.io/m_37697zirj5.mp3",
"e.top4top.io/m_3769rnmrk6.mp3",
"d.top4top.io/m_3769a1jgw1.mp3"
];

function playSong(i){
  if(current !== -1) audio.pause();
  audio.src = "https://" + songs[i];
  audio.play();
  current = i;
}

function stopSong(i){
  if(current === i){
    audio.pause();
    audio.currentTime = 0;
    current = -1;
  }
}

function playRadio(id){
  let q = document.getElementById("quran");
  let m = document.getElementById("music");

  if(id === "quran"){
    m.pause();
    q.paused ? q.play() : q.pause();
  }

  if(id === "music"){
    q.pause();
    m.paused ? m.play() : m.pause();
  }
}

</script>

<audio id="quran" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="music" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>
