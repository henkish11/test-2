<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* ===================== */
/* TOP GRID (الصور) */
/* ===================== */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

/* IMAGE BOX */
.box{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  border-radius:12px;
  overflow:hidden;
  background-size:cover;
  background-position:center;
  box-shadow:0 0 15px rgba(0,255,204,0.3);
  transition:0.3s;
}

.box:hover{
  transform:scale(1.03);
}

/* PASSWORD OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#111;
  color:#00ffcc;
  text-align:center;
  box-shadow:0 0 10px #00ffcc;
}

button{
  padding:8px 20px;
  border:none;
  border-radius:6px;
  background:#00ffcc;
  color:#000;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#00ffaa;
}

/* ===================== */
/* DATA SECTION */
/* ===================== */
.data-section{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:20px;
}

/* BIG MERGED BOX */
.big-box{
  grid-column:1/-1;
  padding:20px;
  border-radius:12px;
  background:rgba(0,255,204,0.05);
  box-shadow:
    0 0 15px #00ffcc30,
    inset 0 0 10px #00ffcc20;
  transition:0.3s;
}

.big-box:hover{
  box-shadow:
    0 0 25px #00ffcc,
    inset 0 0 15px #00ffcc;
}

/* TITLE */
.big-box h3{
  text-align:center;
  margin-bottom:15px;
  text-shadow:0 0 10px #00ffcc;
}

/* INNER GRID */
.grid-inside{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

/* SUB TITLES */
.grid-inside h4{
  margin-bottom:10px;
  text-shadow:0 0 5px #00ffcc;
}

/* LINES */
.line{
  border-bottom:1px solid rgba(0,255,204,0.3);
  padding:6px 0;
  font-size:14px;
}

</style>
</head>

<body>

<!-- ===================== -->
<!-- الصور -->
<!-- ===================== -->
<div class="container">

<!-- BOX 1 -->
<div class="box" style="background-image:url('https://xatimg.com/image/Kn9aywnuvpVo.jpg');"></div>

<!-- BOX 2 -->
<div class="box" style="background-image:url('https://xatimg.com/image/RKBN2koMEBaq.jpg');"></div>

<!-- BOX 3 (باسورد) -->
<div class="box" style="background-image:url('https://xatimg.com/image/La8VreHLPDME.jpg');">
  <div class="overlay" id="lock">
    <input type="password" id="pass" placeholder="ENTER PASSWORD">
    <button onclick="unlock()">ENTER</button>
  </div>
</div>

</div>

<!-- ===================== -->
<!-- البيانات (مربع واحد كبير) -->
<!-- ===================== -->
<div class="data-section">

<div class="big-box">

  <h3>⚡ RAMY SYSTEM DATA</h3>

  <div class="grid-inside">

    <!-- PROFILE -->
    <div>
      <h4>👤 PROFILE</h4>
      <div class="line">Name: Ramy</div>
      <div class="line">Age: 25</div>
      <div class="line">Country: Egypt</div>
      <div class="line">Status: Online</div>
    </div>

    <!-- CHATS -->
    <div>
      <h4>💬 CHATS</h4>
      <div class="line">Chat 1</div>
      <div class="line">Chat 2</div>
      <div class="line">Chat 3</div>
      <div class="line">Chat 4</div>
    </div>

    <!-- SYSTEM -->
    <div>
      <h4>🔥 SYSTEM</h4>
      <div class="line">Power: Active</div>
      <div class="line">Rank: Elite</div>
      <div class="line">Mode: Hacker</div>
      <div class="line">Version: V3</div>
    </div>

  </div>

</div>

</div>

<!-- ===================== -->
<!-- SCRIPT -->
<!-- ===================== -->
<script>
function unlock(){
  let p = document.getElementById("pass").value;

  if(p === "1234"){ // غير الباسورد هنا
    document.getElementById("lock").style.display = "none";
  }else{
    alert("Wrong Password ❌");
  }
}
</script>

</body>
</html>
