<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY SYSTEM</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#00ffcc;
}

/* TOP */
.container{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:14px;
}

.box{
  height:120px;
  border-radius:10px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(0,255,204,0.2);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
  position:relative;
  overflow:hidden;
}

.box::after{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background:linear-gradient(120deg,transparent,rgba(0,255,204,0.25),transparent);
  animation:scan 3s linear infinite;
  transform:rotate(25deg);
}

@keyframes scan{
  0%{transform:translateX(-100%) rotate(25deg);}
  100%{transform:translateX(100%) rotate(25deg);}
}

/* MAIN */
.data-section{
  display:flex;
  justify-content:center;
  padding:20px;
}

.big-box{
  width:95%;
  min-height:950px;
  border-radius:14px;
  background:rgba(0,255,204,0.05);
  box-shadow:0 0 25px rgba(0,255,204,0.2);
  padding:20px;
  display:flex;
  flex-direction:column;
}

/* TOP CONTENT */
.content{
  display:flex;
  gap:20px;
}

/* LEFT */
.left-side{
  width:28%;
  border-right:1px solid rgba(0,255,204,0.2);
  padding-right:15px;
}

.profile{
  display:flex;
  align-items:center;
  gap:15px;
}

.profile img{
  width:95px;
  height:95px;
  border-radius:50%;
  border:3px solid #00ffcc;
  box-shadow:0 0 20px #00ffcc;
}

.name{
  font-size:42px;
  text-shadow:0 0 20px #00ffcc;
}

.radio-box{
  margin-top:15px;
  padding:10px;
  border:1px solid rgba(0,255,204,0.2);
  border-radius:10px;
}

.radio-btn{
  width:100%;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.chat-links a{
  display:block;
  text-decoration:none;
  color:#00ffcc;
  padding:8px;
  margin-top:6px;
  border:1px solid rgba(0,255,204,0.3);
  border-radius:6px;
  text-align:center;
}

/* RIGHT */
.right-side{
  flex:1;
  padding-left:15px;
}

.songs-inner{
  border-radius:14px;
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(0,255,204,0.15);
  padding:12px;
}

.songs-title{
  text-align:center;
  color:#66ccff;
  text-shadow:0 0 10px #66ccff;
}

.songs-grid{
  display:flex;
  gap:10px;
}

.songs-col{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.song-row{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-radius:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,0,0.12);
}

.song-name{
  color:#ffff66;
  text-shadow:0 0 10px #ffff66;
}

.song-actions{
  display:flex;
  gap:6px;
}

.play{
  background:#00ccff;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 10px #00ccff;
}

.stop{
  background:#ff2b2b;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 0 10px #ff2b2b;
}

/* 🔥 MEDIA PLAYER BAR */
.media-bar{
  margin-top:20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  border-radius:12px;
  background:rgba(0,255,204,0.05);
  border:1px solid rgba(0,255,204,0.25);
  box-shadow:0 0 15px rgba(0,255,204,0.2);
}

/* seek */
#seek{
  width:35%;
}

/* play button */
.media-btn{
  background:#00ccff;
  border:none;
  padding:10px 18px;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 0 15px #00ccff;
}

/* volume */
#volume{
  width:25%;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="container">

<div class="box" style="background-image:url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b');"></div>
<div class="box" style="background-image:url('https://images.unsplash.com/photo-1555949963-aa79dcee981c');"></div>
<div class="box" style="background-image:url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5');"></div>

</div>

<!-- MAIN -->
<div class="data-section">

<div class="big-box">

<div class="content">

<!-- LEFT -->
<div class="left-side">

<div class="profile">

<div class="radio-box">

</div>

<div class="radio-box">

<div class="chat-links">

<div class="song-row"><span class="song-name">الشعر الأسود</span></div>
<div class="song-row"><span class="song-name">حبي الأولاني</span></div>
<div class="song-row"><span class="song-name">كوابيس</span></div>
<div class="song-row"><span class="song-name">مش تمام</span></div>
<div class="song-row"><span class="song-name">مشوار الحب</span></div>
<div class="song-row"><span class="song-name">صاحبة الجلالة</span></div>
<div class="song-row"><span class="song-name">عملالي عمل</span></div>
<div class="song-row"><span class="song-name">بحبها</span></div>
<div class="song-row"><span class="song-name">فيكي سر</span></div>
<div class="song-row"><span class="song-name">حياتي قصيدة</span></div>
</div>

<div class="songs-col">
<div class="song-row"><span class="song-name">لسه</span></div>
<div class="song-row"><span class="song-name">مش زي غيرها</span></div>
<div class="song-row"><span class="song-name">نسند بعض</span></div>
<div class="song-row"><span class="song-name">وش السعد</span></div>
<div class="song-row"><span class="song-name">يا حظ بيه</span></div>
<div class="song-row"><span class="song-name">ياللي ناسيني</span></div>
<div class="song-row"><span class="song-name">هلوسة</span></div>
<div class="song-row"><span class="song-name">قصة حب</span></div>
<div class="song-row"><span class="song-name">ذكريات</span></div>
<div class="song-row"><span class="song-name">حبيتك ليه</span></div>
<div class="song-row"><span class="song-name">توأمي</span></div>
</div>

</div>

</div>

<!-- 🔥 MEDIA PLAYER BAR -->
<div class="media-bar">

<input type="range" id="seek" value="0">

<button class="media-btn" onclick="togglePlay()">▶ / ⏸</button>

<input type="range" id="volume" min="0" max="1" step="0.1" value="1">

</div>

</div>

</div>

</div>

<!-- AUDIO -->
<audio id="audio"></audio>
<audio id="quran" src="https://stream.radiojar.com/8s5u5tpdtwzuv"></audio>
<audio id="music" src="https://audio.nrpstream.com/listen/nogoumfm/radio.mp3"></audio>

<script>

const audio=document.getElementById("audio");
const seek=document.getElementById("seek");
const volume=document.getElementById("volume");

const songs=[
"https://j.top4top.io/m_3769le8x51.mp3",
"https://k.top4top.io/m_3769enq6z2.mp3",
"https://l.top4top.io/m_3769auk3d3.mp3",
"https://a.top4top.io/m_3769kdadn4.mp3",
"https://b.top4top.io/m_3769kg8sd5.mp3",
"https://c.top4top.io/m_3769ien0c6.mp3",
"https://d.top4top.io/m_3769yw3257.mp3",
"https://e.top4top.io/m_3769yb3k29.mp3",
"https://f.top4top.io/m_37690zriz10.mp3",
"https://b.top4top.io/m_3769lxi681.mp3",
"https://c.top4top.io/m_3769g0kg52.mp3",
"https://d.top4top.io/m_3769xz8mi3.mp3",
"https://e.top4top.io/m_3769o93s34.mp3",
"https://f.top4top.io/m_3769c3tql5.mp3",
"https://g.top4top.io/m_3769r7bcu6.mp3",
"https://l.top4top.io/m_3769p7dkd1.mp3",
"https://a.top4top.io/m_37697muuj2.mp3",
"https://b.top4top.io/m_3769i9yd13.mp3",
"https://c.top4top.io/m_3769ou0bt4.mp3",
"https://d.top4top.io/m_37697zirj5.mp3",
"https://e.top4top.io/m_3769rnmrk6.mp3",
"https://d.top4top.io/m_3769a1jgw1.mp3"
];

let current=0;

function playSong(i){
current=i;
audio.src=songs[i];
audio.play();
}

function stopSong(){
audio.pause();
audio.currentTime=0;
}

function togglePlay(){
audio.paused?audio.play():audio.pause();
}

volume.oninput=()=>{
audio.volume=volume.value;
}

audio.ontimeupdate=()=>{
seek.value=(audio.currentTime/audio.duration)*100;
}

seek.oninput=()=>{
audio.currentTime=(seek.value/100)*audio.duration;
}

function toggleRadio(type){
const q=document.getElementById("quran");
const m=document.getElementById("music");

if(type==="quran"){
m.pause();
q.paused?q.play():q.pause();
}
if(type==="music"){
q.pause();
m.paused?m.play():m.pause();
}
}

</script>

</body>
</html>
